<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>短语记忆 · 第三单元</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh; min-height: 100dvh;
            display: flex; justify-content: center; align-items: flex-start;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 8px;
        }
        .game-container {
            max-width: 800px; width: 100%;
            background: rgba(255,255,255,0.13);
            backdrop-filter: blur(4px);
            padding: 1.2rem 1rem;
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
        }
        h1 {
            font-weight: 500; color: #e9f2f7;
            text-shadow: 0 2px 6px #0a1e2b;
            letter-spacing: 1px;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 1rem; font-size: 1.3rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        h1 small {
            font-size: 0.85rem; font-weight: 300; opacity: 0.8;
            background: #1f4a5e; padding: 0.3rem 0.8rem;
            border-radius: 60px; border: 1px solid #8fc3d9;
        }
        .card-item {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
        }
        .card-english {
            color: #e9f2f7; font-size: 0.95rem;
            line-height: 1.6; margin-bottom: 0.8rem; font-weight: 500;
        }
        .card-english .blank {
            color: #fcdb7a; font-weight: 600;
            border-bottom: 2px dashed #fcdb7a;
            padding: 0 4px; min-width: 60px;
            display: inline-block; text-align: center;
        }
        .card-answer {
            color: #a5d6a7; font-size: 0.9rem;
            line-height: 1.6; margin-bottom: 0.5rem;
            padding: 0.8rem; background: rgba(0,0,0,0.2);
            border-radius: 16px; display: none;
        }
        .card-answer.show { display: block; }
        .card-hint {
            color: #8fc3d9; font-size: 0.8rem;
            line-height: 1.4; margin-bottom: 0.6rem;
            padding: 6px 10px; background: rgba(255,255,255,0.05);
            border-radius: 10px; display: none;
        }
        .card-hint.show { display: block; }
        .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-small {
            padding: 6px 14px; font-size: 0.8rem;
            border-radius: 40px; font-weight: 600;
            cursor: pointer; border: none; transition: 0.1s;
        }
        .btn-reveal { background: #264e63; color: #bfdef0; border: 1px solid #578aa3; }
        .btn-mark { background: #1d4d4b; color: #a5d6a7; border: 1px solid #479f9b; }
        .btn-mark.marked { background: #fad974; color: #1d3f4a; border-color: #ffe399; }
        .progress-bar {
            background: rgba(0,0,0,0.3); border-radius: 30px;
            height: 6px; margin: 0 0 1rem; overflow: hidden;
        }
        .progress-fill {
            background: #fad974; height: 6px; border-radius: 30px;
            transition: width 0.25s ease;
        }
        .nav-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 1rem; padding-top: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-bar .progress-text { color: #bfdef0; font-size: 0.9rem; }
        .nav-bar .progress-text strong { color: #fcdb7a; }
        .back-link {
            color: #bfdef0; font-size: 0.85rem;
            text-decoration: none; margin-bottom: 0.5rem; display: inline-block;
        }
        .back-link:hover { color: #fcdb7a; }
        @media (max-width: 480px) {
            .game-container { padding: 0.8rem 0.6rem; border-radius: 28px; }
            h1 { font-size: 1.1rem; }
            .card-english { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <a class="back-link" href="index.html">← 返回首页</a>
    <h1>📝 短语记忆 <small>U3 · 18句</small></h1>

    <div class="progress-bar"><div class="progress-fill" id="practice-progress" style="width:0%"></div></div>
    <div id="cards-container"></div>
    <div class="nav-bar">
        <span class="progress-text">进度: <strong id="card-progress">0/0</strong></span>
    </div>
</div>

<script>
(function(){
    const ALL_CARDS = [
        { id: 1, unit: 'U3', type: 'Expressions', sentence: 'Over the last decade, the trend toward working from home has slowly _____ across the country.', phrase: 'gained ground', hint: 'has 后接过去分词 / gained ground' },
        { id: 2, unit: 'U3', type: 'Expressions', sentence: 'Many students have _____ the experience of participating in the summer camp _____ life-changing and the best time they\'ve ever had.', phrase: 'hailed; as', hint: '主语复数，一般过去时 / hailed; as' },
        { id: 3, unit: 'U3', type: 'Expressions', sentence: 'These workshops provide students with opportunities to experiment with different techniques and _____ what they have learned _____ in a supportive environment.', phrase: 'put; into practice', hint: 'and 连接并列祈使句，动词原形 / put; into practice' },
        { id: 4, unit: 'U3', type: 'Expressions', sentence: 'The artist restored the painting and _____ it _____, revealing the fine colors of the rainbow, which were lost beneath layers of dirt.', phrase: 'brought; to life', hint: 'and 连接并列谓语，一般过去时 / brought; to life' },
        { id: 5, unit: 'U3', type: 'Expressions', sentence: 'When students are exposed to environments that are _____ learning, the chances of achieving their educational goals increase.', phrase: 'conducive to', hint: 'be conducive to 固定搭配 / conducive to' },
        { id: 6, unit: 'U3', type: 'Expressions', sentence: 'We should be open to new ways of thinking, _____ what we do, and strive to improve ourselves on the basis of our experience.', phrase: 'reflect on', hint: 'and 连接并列祈使句 / reflect on' },
        { id: 7, unit: 'U3', type: 'Expressions', sentence: 'Several hours later, the budget meeting _____ and the board members filed out of the room.', phrase: 'drew to a close', hint: '一般过去时 / drew to a close' },
        { id: 8, unit: 'U3', type: 'Expressions', sentence: 'Some research suggests that the history of the Mid-Autumn Festival can be _____ more than 3,000 years ago.', phrase: 'traced back to', hint: '被动语态 / traced back to' },
        { id: 9, unit: 'U3', type: 'Words', sentence: 'During the discussion, the professor was mostly listening and only occasionally gave a few remarks to bring _____ to the issue being discussed.', phrase: 'clarity', hint: 'bring 后接名词 / clarity' },
        { id: 10, unit: 'U3', type: 'Words', sentence: 'Today many governments around the world are _____ to invest in technology to tackle social and environmental problems.', phrase: 'keen', hint: 'be keen to 固定搭配 / keen' },
        { id: 11, unit: 'U3', type: 'Words', sentence: 'Situated in the heart of the town, the hotel is an ideal _____ for business meetings, weddings, and other large group events.', phrase: 'venue', hint: 'an ideal 后接单数名词 / venue' },
        { id: 12, unit: 'U3', type: 'Words', sentence: 'For small businesses, online videos are a great way to _____ their products or services to new and existing customers.', phrase: 'showcase', hint: 'to 后接动词原形 / showcase' },
        { id: 13, unit: 'U3', type: 'Words', sentence: 'The _____ and rapid growth of e-commerce has reshaped the way business is conducted, making online shopping an integral part of our life.', phrase: 'emergence', hint: 'the 后接名词 / emergence' },
        { id: 14, unit: 'U3', type: 'Words', sentence: 'The new kindergarten will get a generous _____ of funds to improve its outdoor facilities.', phrase: 'allocation', hint: 'a generous 后接单数名词 / allocation' },
        { id: 15, unit: 'U3', type: 'Words', sentence: 'His job involves deciding on matters with different objectives that often _____ with each other, e.g., company profits vs. investor returns.', phrase: 'clash', hint: '主语是复数 objectives，用动词原形 / clash' },
        { id: 16, unit: 'U3', type: 'Words', sentence: 'The structures of the wings of a bird and a butterfly are _____ because they are basically similar in shape and function.', phrase: 'analogous', hint: 'be 动词后接形容词 / analogous' },
        { id: 17, unit: 'U3', type: 'Words', sentence: 'Despite challenges, the Chinese economy continues to enjoy strong _____ and remains a crucial contributor to world economic growth.', phrase: 'momentum', hint: 'strong 后接名词 / momentum' },
        { id: 18, unit: 'U3', type: 'Words', sentence: 'As the company\'s first CFO for many years, Bob has played a leading role in _____ the company through a significant growth period.', phrase: 'navigating', hint: 'in 后接动名词 / navigating' }
    ];

    let cardStates = ALL_CARDS.map(() => ({ revealed: false, marked: false }));
    const cardsContainer = document.getElementById('cards-container');
    const progressFill = document.getElementById('practice-progress');
    const cardProgress = document.getElementById('card-progress');

    function renderCards() {
        cardsContainer.innerHTML = '';
        ALL_CARDS.forEach((card, idx) => {
            const state = cardStates[idx];
            const div = document.createElement('div');
            div.className = 'card-item';
            div.innerHTML = `
                <div class="card-english">${card.sentence.replace(/_____/g, '<span class="blank">_____</span>')}</div>
                <div class="card-answer ${state.revealed ? 'show' : ''}" id="answer-${idx}">
                    <strong>✓ ${card.phrase}</strong> · ${card.type}
                </div>
                <div class="card-hint ${state.revealed ? 'show' : ''}" id="hint-${idx}">💡 ${card.hint}</div>
                <div class="card-actions">
                    <button class="btn-small btn-reveal" data-idx="${idx}">${state.revealed ? '🔒 隐藏答案' : '👁 查看答案'}</button>
                    <button class="btn-small btn-mark ${state.marked ? 'marked' : ''}" data-idx="${idx}">${state.marked ? '✅ 已记住' : '⭐ 记住了'}</button>
                </div>`;
            cardsContainer.appendChild(div);
        });
        cardsContainer.querySelectorAll('.btn-reveal').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                cardStates[idx].revealed = !cardStates[idx].revealed;
                document.getElementById(`answer-${idx}`).classList.toggle('show');
                document.getElementById(`hint-${idx}`).classList.toggle('show');
                e.target.textContent = cardStates[idx].revealed ? '🔒 隐藏答案' : '👁 查看答案';
                updateProgress();
            });
        });
        cardsContainer.querySelectorAll('.btn-mark').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                cardStates[idx].marked = !cardStates[idx].marked;
                e.target.classList.toggle('marked');
                e.target.textContent = cardStates[idx].marked ? '✅ 已记住' : '⭐ 记住了';
                updateProgress();
            });
        });
    }
    function updateProgress() {
        const total = cardStates.length;
        const revealed = cardStates.filter(s => s.revealed).length;
        const marked = cardStates.filter(s => s.marked).length;
        progressFill.style.width = `${(revealed / total) * 100}%`;
        cardProgress.textContent = `${marked}/${total} 已记住`;
    }
    renderCards();
    updateProgress();
})();
</script>
</body>
</html>

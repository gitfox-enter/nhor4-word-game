<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>单词消消乐 · 双列手机版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 8px;
        }
        .game-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(4px);
            padding: 1rem 0.8rem;
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        h1 {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-weight: 500;
            color: #e9f2f7;
            text-shadow: 0 2px 6px #0a1e2b;
            letter-spacing: 1px;
            padding: 0 0.2rem 0.6rem 0.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 6px 8px;
        }
        .title-part {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .title-part small {
            font-size: 0.8rem;
            font-weight: 300;
            opacity: 0.8;
        }
        .progress-badge {
            background: #1f4a5e;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid #8fc3d9;
            color: #ddf0fa;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
            white-space: nowrap;
        }
        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem 1rem;
            margin: 0.5rem 0 1rem;
        }
        .word-column, .def-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .col-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #bfdef0;
            font-weight: 400;
            padding-left: 6px;
            margin-bottom: 2px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
            padding: 8px 10px;
            border-radius: 30px;
            border: 2px solid transparent;
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.1s ease;
            cursor: pointer;
            user-select: none;
            word-break: break-word;
            display: flex;
            align-items: center;
            line-height: 1.3;
            min-height: 44px;
        }
        .word-card {
            background: #264e63;
            border-color: #578aa3;
        }
        .def-card {
            background: #1d4d4b;
            border-color: #479f9b;
        }
        .card.selected {
            border: 3px solid #f7d44a;
            background: #3b6c7c;
            transform: scale(1.02);
            box-shadow: 0 0 0 3px rgba(247,212,74,0.4);
        }
        .card.matched {
            opacity: 0.2;
            transform: scale(0.9);
            cursor: default;
            background: #2c3e4a;
            border-color: #5f7e8c;
            text-decoration: line-through 1px rgba(255,255,255,0.2);
            pointer-events: none;
            filter: grayscale(0.8);
        }
        .card:active:not(.matched):not(.selected) {
            transform: scale(0.95);
        }
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 12px;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            margin-top: 0.3rem;
        }
        .status-msg {
            color: #d4eaf5;
            font-size: 0.9rem;
            font-weight: 300;
            flex: 1;
        }
        .status-msg strong {
            font-weight: 600;
            color: #fcdb7a;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn {
            background: #e6edf2;
            border: none;
            padding: 6px 16px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1a3e4e;
            box-shadow: 0 4px 0 #0d2a36;
            transition: 0.06s linear;
            cursor: pointer;
            border: 1px solid #bad7e6;
            letter-spacing: 0.3px;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0d2a36;
        }
        .btn-primary {
            background: #fad974;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
            border-color: #ffe399;
        }
        .btn-secondary {
            background: #b6d2df;
        }
        .footer-note {
            color: #afcbd9;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 0.6rem;
            opacity: 0.7;
        }
        @media (max-width: 480px) {
            .game-container {
                padding: 0.6rem 0.4rem;
                border-radius: 28px;
            }
            .game-board {
                gap: 0.4rem 0.6rem;
            }
            .card {
                font-size: 0.75rem;
                padding: 6px 8px;
                min-height: 38px;
                border-radius: 24px;
            }
            .title-part {
                font-size: 1.2rem;
            }
            .progress-badge {
                font-size: 0.8rem;
                padding: 0.2rem 0.8rem;
            }
            .status-msg {
                font-size: 0.8rem;
            }
            .btn {
                font-size: 0.75rem;
                padding: 5px 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <h1>
        <span class="title-part">🧩 消消乐 <small>U3</small></span>
        <span class="progress-badge" id="progressDisplay">第 1 / 6 关</span>
    </h1>

    <div class="game-board">
        <div class="word-column">
            <div class="col-header">📌 英文</div>
            <div id="wordList"></div>
        </div>
        <div class="def-column">
            <div class="col-header">📖 中文</div>
            <div id="defList"></div>
        </div>
    </div>

    <div class="control-bar">
        <span class="status-msg" id="statusMessage">✦ 选英文 → 选中文</span>
        <div class="btn-group">
            <button class="btn btn-primary" id="nextRoundBtn" style="display:none;">▶ 下一关</button>
            <button class="btn btn-secondary" id="resetGameBtn">🔄 重开</button>
        </div>
    </div>
    <div class="footer-note">每关10对 · 共55对 · 左右配对</div>
</div>

<script>
    (function(){
        const FULL_WORDS = [
            { word: "interior", def: "内部；里面" },
            { word: "block", def: "大楼；大厦；街区" },
            { word: "attentive", def: "注意听的；专注的；专心的；周到的；体贴的" },
            { word: "attentively", def: "专注地；专心地；周到地；体贴地" },
            { word: "makerspace", def: "创客空间" },
            { word: "drone", def: "无人机；嗡嗡声" },
            { word: "draw to a close / an end", def: "终止；结束" },
            { word: "cram", def: "把…塞入；（人）挤进，挤满" },
            { word: "venue", def: "举办地点；举行场所；会场" },
            { word: "electronics", def: "电子学；电子工业；电子设备；电子仪器" },
            { word: "put sth. into practice", def: "把…付诸实施" },
            { word: "showcase", def: "展示；使亮相；显示优点的事件；亮相的场合" },
            { word: "aspire", def: "追求；渴望；有志于" },
            { word: "aspiring", def: "有抱负的；有志向的" },
            { word: "trace sth. (back) to sth.", def: "追溯；追查" },
            { word: "emergence", def: "出现；被认可；摆脱（困境）" },
            { word: "gain ground", def: "稳步发展；变得更受欢迎（更成功）" },
            { word: "crowdfunding", def: "众筹" },
            { word: "in terms of sth.", def: "从…方面来说；根据…来解释" },
            { word: "on the contrary", def: "正相反；恰恰相反" },
            { word: "paradigm", def: "模型，例子；示例；范例；样式" },
            { word: "administrative", def: "行政的；管理的" },
            { word: "carnival", def: "狂欢（节）；嘉年华；游乐场；户外游艺会" },
            { word: "analogous", def: "相似的；类似的" },
            { word: "sponsorship", def: "赞助，资助；资助；倡议" },
            { word: "a handful of", def: "几个；少数" },
            { word: "pick up", def: "好转；改善；增强" },
            { word: "intersection", def: "交汇点；交叉；十字路口" },
            { word: "hardware", def: "硬件；金属器件；五金制品" },
            { word: "facilitation", def: "促进；简易化" },
            { word: "commercialize", def: "使商品化；使商业化" },
            { word: "staff", def: "全体职员；员工" },
            { word: "prototype", def: "原型，雏形；典型；样板" },
            { word: "bring sth. to life", def: "赋予…生命；使…鲜活起来" },
            { word: "diversify", def: "（使）多样化，多元化" },
            { word: "momentum", def: "动力；势头；冲力，推力" },
            { word: "consultation", def: "专家咨询；商量；磋商" },
            { word: "interface", def: "界面（指计算机屏幕布局）" },
            { word: "reflect on", def: "仔细思考；表达（意见）" },
            { word: "clarity", def: "清晰；明晰" },
            { word: "hence", def: "因此；由此；所以" },
            { word: "keen", def: "热衷的；渴望的；热切的；喜欢" },
            { word: "override", def: "否决；改变（别人的决定）；比…更重要；凌驾" },
            { word: "clash", def: "有分歧，不相容；争论；交锋" },
            { word: "allocation", def: "配给物；配给量，份额；分配；分派；划拨" },
            { word: "hail sth./sb. as", def: "把…称赞为；把…誉为" },
            { word: "ingenious", def: "精巧的，巧妙的；善于创造发明的，足智多谋的" },
            { word: "ecosystem", def: "生态系统" },
            { word: "earnings", def: "利润，收益；薪水；工资" },
            { word: "trustworthy", def: "值得信赖的；可信的；可靠的" },
            { word: "conducive", def: "有利的；有助的；有益的" },
            { word: "be conducive to sth.", def: "有助于…；有益于…" },
            { word: "navigate", def: "导航，指引方向；理解，应付（困难复杂的情况）" },
            { word: "invigorate", def: "使更强健；激励；使精力充沛" },
            { word: "as a whole", def: "总体上；整个看来" }
        ];

        let allWords = [];
        let currentRoundItems = [];
        let matchedCount = 0;
        const roundSize = 10;
        let totalRounds = 0;
        let currentRound = 0;

        const wordListEl = document.getElementById('wordList');
        const defListEl = document.getElementById('defList');
        const statusMsg = document.getElementById('statusMessage');
        const progressDisplay = document.getElementById('progressDisplay');
        const nextBtn = document.getElementById('nextRoundBtn');
        const resetBtn = document.getElementById('resetGameBtn');

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let selectedElement = null;
        let selectedType = null;
        let selectedWordText = null;
        let selectedDefText = null;

        function clearSelected() {
            if (selectedElement) {
                selectedElement.classList.remove('selected');
                selectedElement = null;
            }
            selectedType = null;
            selectedWordText = null;
            selectedDefText = null;
        }

        function tryMatch(wordText, defText) {
            for (let item of currentRoundItems) {
                if (item.word === wordText && item.def === defText) return true;
            }
            return false;
        }

        function updateNextButton() {
            if (currentRoundItems.length === 0 && matchedCount > 0) {
                if (allWords.length === 0) {
                    statusMsg.innerHTML = `🎉 全部 <strong>${FULL_WORDS.length}</strong> 个单词已消灭！`;
                    nextBtn.style.display = 'none';
                } else {
                    statusMsg.innerHTML = `✨ 过关！剩余 ${allWords.length} 个，点击下一关`;
                    nextBtn.style.display = 'inline-block';
                }
                return true;
            } else {
                nextBtn.style.display = 'none';
                return false;
            }
        }

        function renderRound() {
            wordListEl.innerHTML = '';
            defListEl.innerHTML = '';
            clearSelected();

            if (currentRoundItems.length === 0) {
                statusMsg.innerHTML = `📭 本关无单词`;
                return;
            }

            const words = currentRoundItems.map(item => item.word);
            const defs = currentRoundItems.map(item => item.def);
            const shuffledWords = shuffleArray([...words]);
            const shuffledDefs = shuffleArray([...defs]);

            shuffledWords.forEach(w => {
                const card = document.createElement('div');
                card.className = 'card word-card';
                card.textContent = w;
                card.dataset.type = 'word';
                card.dataset.value = w;
                wordListEl.appendChild(card);
            });

            shuffledDefs.forEach(d => {
                const card = document.createElement('div');
                card.className = 'card def-card';
                card.textContent = d;
                card.dataset.type = 'def';
                card.dataset.value = d;
                defListEl.appendChild(card);
            });

            attachCardEvents();

            const total = FULL_WORDS.length;
            const completed = total - allWords.length - currentRoundItems.length;
            progressDisplay.textContent = `第 ${currentRound}/${totalRounds} 关 (${completed}/${total})`;
            statusMsg.innerHTML = `🎯 配对 0/${currentRoundItems.length}`;
            nextBtn.style.display = 'none';
        }

        function attachCardEvents() {
            const allCards = document.querySelectorAll('.card:not(.matched)');
            allCards.forEach(card => {
                card.removeEventListener('click', cardClickHandler);
                card.addEventListener('click', cardClickHandler);
            });
        }

        function cardClickHandler(e) {
            const card = e.currentTarget;
            if (card.classList.contains('matched')) return;

            const cardType = card.dataset.type;
            const cardValue = card.dataset.value;

            if (!selectedElement) {
                card.classList.add('selected');
                selectedElement = card;
                selectedType = cardType;
                if (cardType === 'word') {
                    selectedWordText = cardValue;
                    selectedDefText = null;
                    statusMsg.innerHTML = `🔍 英文: <strong>${cardValue}</strong>，选对应中文`;
                } else {
                    selectedDefText = cardValue;
                    selectedWordText = null;
                    statusMsg.innerHTML = `🔍 中文: <strong>${cardValue}</strong>，选对应英文`;
                }
                return;
            }

            if (selectedElement === card) {
                clearSelected();
                statusMsg.innerHTML = `✋ 已取消`;
                return;
            }

            if (selectedType !== cardType) {
                let wordText, defText;
                if (selectedType === 'word' && cardType === 'def') {
                    wordText = selectedWordText;
                    defText = cardValue;
                } else if (selectedType === 'def' && cardType === 'word') {
                    wordText = cardValue;
                    defText = selectedDefText;
                } else {
                    clearSelected();
                    return;
                }

                if (tryMatch(wordText, defText)) {
                    const wordCard = (selectedType === 'word') ? selectedElement : card;
                    const defCard = (selectedType === 'def') ? selectedElement : card;

                    wordCard.classList.remove('selected');
                    wordCard.classList.add('matched');
                    defCard.classList.remove('selected');
                    defCard.classList.add('matched');

                    const idx = currentRoundItems.findIndex(item => item.word === wordText && item.def === defText);
                    if (idx !== -1) currentRoundItems.splice(idx, 1);

                    matchedCount++;
                    clearSelected();
                    statusMsg.innerHTML = `✅ 配对成功！ (${matchedCount} 对)`;

                    if (currentRoundItems.length === 0) {
                        updateNextButton();
                    } else {
                        statusMsg.innerHTML = `✅ 已配对 ${matchedCount} 对，剩余 ${currentRoundItems.length} 对`;
                    }
                } else {
                    statusMsg.innerHTML = `❌ 错误，重新选择`;
                    clearSelected();
                }
            } else {
                clearSelected();
                card.classList.add('selected');
                selectedElement = card;
                selectedType = cardType;
                if (cardType === 'word') {
                    selectedWordText = cardValue;
                    selectedDefText = null;
                    statusMsg.innerHTML = `🔍 英文: <strong>${cardValue}</strong>，选对应中文`;
                } else {
                    selectedDefText = cardValue;
                    selectedWordText = null;
                    statusMsg.innerHTML = `🔍 中文: <strong>${cardValue}</strong>，选对应英文`;
                }
            }
        }

        function loadNextRound() {
            if (allWords.length === 0 && currentRoundItems.length === 0) {
                statusMsg.innerHTML = `🏁 通关！全部 ${FULL_WORDS.length} 个单词已消灭！`;
                progressDisplay.textContent = `完成！ ${FULL_WORDS.length}/${FULL_WORDS.length}`;
                nextBtn.style.display = 'none';
                wordListEl.innerHTML = '';
                defListEl.innerHTML = '';
                return;
            }

            if (allWords.length > 0) {
                const count = Math.min(roundSize, allWords.length);
                const roundItems = allWords.splice(0, count);
                currentRoundItems = roundItems;
                matchedCount = 0;
                currentRound++;
                totalRounds = Math.ceil((FULL_WORDS.length - (FULL_WORDS.length - allWords.length - currentRoundItems.length)) / roundSize);
                renderRound();
            }
        }

        function resetGame() {
            allWords = FULL_WORDS.map(item => ({ word: item.word, def: item.def }));
            allWords = shuffleArray(allWords);
            currentRoundItems = [];
            matchedCount = 0;
            currentRound = 0;
            totalRounds = Math.ceil(FULL_WORDS.length / roundSize);
            clearSelected();
            loadNextRound();
            nextBtn.style.display = 'none';
        }

        nextBtn.addEventListener('click', function() {
            if (allWords.length > 0) loadNextRound();
            else {
                statusMsg.innerHTML = `🎉 所有单词已消灭！`;
                nextBtn.style.display = 'none';
            }
        });

        resetBtn.addEventListener('click', resetGame);

        resetGame();

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.card')) {
                clearSelected();
                if (document.querySelectorAll('.card:not(.matched)').length > 0) {
                    statusMsg.innerHTML = `🧼 已取消`;
                }
            }
        });
    })();
</script>
</body>
</html>

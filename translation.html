<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>翻译题 · 对照记忆卡片（完整真实数据版）</title>
    <script src="data/translations.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 12px;
        }
        .game-container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(4px);
            padding: 1.2rem 1rem;
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
        }
        h1 {
            font-weight: 500;
            color: #e9f2f7;
            text-shadow: 0 2px 6px #0a1e2b;
            letter-spacing: 1px;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 1rem;
            font-size: 1.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        h1 small {
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.8;
            background: #1f4a5e;
            padding: 0.3rem 0.8rem;
            border-radius: 60px;
            border: 1px solid #8fc3d9;
        }
        .level-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }
        .level-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            padding: 8px 18px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #bfdef0;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(2px);
        }
        .level-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.3); }
        .level-btn.active {
            background: #fad974;
            border-color: #ffe399;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
        }
        .mnemonic-card {
            background: linear-gradient(135deg, rgba(250, 217, 116, 0.15), rgba(143, 195, 217, 0.15));
            border: 2px solid rgba(250, 217, 116, 0.3);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1.2rem;
        }
        .mnemonic-title {
            color: #fad974;
            font-size: 0.9rem;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mnemonic-rhyme {
            color: #e9f2f7;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            text-align: center;
            letter-spacing: 1px;
        }
        .mnemonic-keywords {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .keyword-tag {
            background: rgba(143, 195, 217, 0.2);
            border: 1px solid rgba(143, 195, 217, 0.4);
            border-radius: 12px;
            padding: 4px 10px;
            color: #8fc3d9;
            font-size: 0.8rem;
        }
        .card-item {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
        }
        .card-item:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.2);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.8rem;
        }
        .card-num {
            background: #fad974;
            color: #1d3f4a;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .card-label {
            color: #8fc3d9;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .card-mnemonic {
            color: #fcdb7a;
            font-size: 0.75rem;
            background: rgba(252, 219, 122, 0.1);
            padding: 2px 8px;
            border-radius: 8px;
            margin-left: auto;
        }
        .card-english {
            color: #e9f2f7;
            font-size: 1rem;
            line-height: 2;
            margin-bottom: 1rem;
            font-weight: 500;
            background: rgba(0,0,0,0.15);
            padding: 1rem;
            border-radius: 16px;
            border-left: 4px solid #fad974;
        }
        .card-chinese {
            color: #fcdb7a;
            font-size: 1rem;
            line-height: 1.9;
            font-weight: 500;
            background: rgba(250, 217, 116, 0.1);
            padding: 1rem;
            border-radius: 16px;
            border-left: 4px solid #fcdb7a;
        }
        .annotation {
            color: #8fc3d9;
            font-weight: 600;
            background: rgba(143, 195, 217, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .mode-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.85rem;
            color: #bfdef0;
            cursor: pointer;
            transition: 0.15s;
        }
        .mode-btn.active {
            background: #8fc3d9;
            border-color: #8fc3d9;
            color: #1d3f4a;
        }
        .exam-section {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 1.2rem;
            margin-top: 1rem;
        }
        .exam-title {
            color: #fad974;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .exam-item {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.8rem;
        }
        .exam-question {
            color: #e9f2f7;
            font-size: 0.95rem;
            line-height: 1.8;
            margin-bottom: 0.8rem;
        }
        .exam-input {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 12px 16px;
            color: #e9f2f7;
            font-size: 1rem;
            margin-bottom: 0.8rem;
            font-family: inherit;
        }
        .exam-input::placeholder { color: rgba(255,255,255,0.4); }
        .exam-input:focus { outline: none; border-color: #fad974; }
        .check-btn {
            background: linear-gradient(135deg, #fad974, #f5c542);
            border: none;
            border-radius: 12px;
            padding: 10px 24px;
            color: #1d3f4a;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .check-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(250, 217, 116, 0.3);
        }
        .result {
            margin-top: 0.8rem;
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 0.9rem;
        }
        .result.correct {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.4);
            color: #81c784;
        }
        .result.wrong {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.4);
            color: #e57373;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-link {
            color: #8fc3d9;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .nav-link:hover { color: #fad974; }
        .format-tip {
            background: rgba(143, 195, 217, 0.15);
            border: 1px solid rgba(143, 195, 217, 0.3);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            color: #8fc3d9;
            font-size: 0.85rem;
        }
        .format-tip strong { color: #fad974; }
        .quick-review {
            background: rgba(76, 175, 80, 0.15);
            border: 2px solid rgba(76, 175, 80, 0.3);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .quick-review-title {
            color: #81c784;
            font-size: 0.9rem;
            margin-bottom: 0.6rem;
        }
        .quick-review-content {
            color: #e9f2f7;
            font-size: 0.85rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>
            📝 翻译题练习（完整真实数据）
            <small id="unit-label">选择单元</small>
        </h1>

        <div class="format-tip">
            <strong>📌 考试格式要求：</strong>在生词或关键词后面加括号写中文，再把整句的中文意思串起来讲
        </div>

        <div class="level-grid" id="levelGrid">
            <button class="level-btn active" data-unit="U1">Unit 1</button>
            <button class="level-btn" data-unit="U3">Unit 3</button>
            <button class="level-btn" data-unit="U4">Unit 4</button>
            <button class="level-btn" data-unit="U6">Unit 6</button>
        </div>

        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="study">📖 学习模式</button>
            <button class="mode-btn" data-mode="exam">✍️ 考试模式</button>
            <button class="mode-btn" data-mode="quick">⚡ 考前速记</button>
        </div>

        <div id="contentArea">
            <!-- 内容将在这里动态生成 -->
        </div>

        <div class="nav-bar">
            <a href="index.html" class="nav-link">← 返回首页</a>
            <a href="word-exam-v2.html" class="nav-link">单词练习 →</a>
        </div>
    </div>

    <script>
        let currentUnit = 'U1';
        let currentMode = 'study';

        // 解析英文，高亮括号注释
        function formatEnglish(text) {
            return text.replace(/（([^）]+)）/g, '<span class="annotation">（$1）</span>');
        }

        // 渲染顺口溜速记卡
        function renderMnemonicCard() {
            const mnemonic = MNEMONICS[currentUnit];
            if (!mnemonic) return '';
            return `
                <div class="mnemonic-card">
                    <div class="mnemonic-title">🧠 顺口溜速记</div>
                    <div class="mnemonic-rhyme">${mnemonic.rhyme}</div>
                    <div class="mnemonic-keywords">
                        ${mnemonic.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('')}
                    </div>
                </div>
            `;
        }

        // 渲染学习模式
        function renderStudyMode() {
            const container = document.getElementById('contentArea');
            const data = TRANSLATIONS_DATA[currentUnit] || [];
            const mnemonicHtml = renderMnemonicCard();

            if (data.length === 0) {
                container.innerHTML = '<div style="color:#8fc3d9;text-align:center;padding:2rem;">该单元暂无数据</div>';
                return;
            }

            container.innerHTML = mnemonicHtml + data.map(item => `
                <div class="card-item">
                    <div class="card-header">
                        <span class="card-num">${item.num}</span>
                        <span class="card-label">翻译题 ${item.num}</span>
                        ${item.mnemonic ? `<span class="card-mnemonic">🧠 ${item.mnemonic}</span>` : ''}
                    </div>
                    <div class="card-english">
                        ${formatEnglish(item.english)}
                    </div>
                    <div class="card-chinese">
                        ${item.chinese}
                    </div>
                </div>
            `).join('');
        }

        // 渲染考前速记模式
        function renderQuickReviewMode() {
            const container = document.getElementById('contentArea');
            const data = TRANSLATIONS_DATA[currentUnit] || [];
            const mnemonic = MNEMONICS[currentUnit];

            if (data.length === 0) {
                container.innerHTML = '<div style="color:#8fc3d9;text-align:center;padding:2rem;">该单元暂无数据</div>';
                return;
            }

            const allEnglish = data.map(item => item.english).join('\n\n');
            const allChinese = data.map(item => item.chinese).join('\n\n');

            container.innerHTML = `
                ${renderMnemonicCard()}
                <div class="quick-review">
                    <div class="quick-review-title">⚡ 考前快速复习 - ${currentUnit}</div>
                    <div class="quick-review-content">
                        <strong style="color:#fad974;">英文原文（带注释）：</strong>
                        <div style="margin: 0.8rem 0;padding:0.8rem;background:rgba(0,0,0,0.2);border-radius:12px;">
                            ${formatEnglish(allEnglish).replace(/\n\n/g, '<br><br>')}
                        </div>
                        <strong style="color:#fad974;">中文翻译：</strong>
                        <div style="margin: 0.8rem 0;padding:0.8rem;background:rgba(250,217,116,0.1);border-radius:12px;">
                            ${allChinese.replace(/\n\n/g, '<br><br>')}
                        </div>
                    </div>
                </div>
            `;
        }

        // 渲染考试模式
        function renderExamMode() {
            const container = document.getElementById('contentArea');
            const data = TRANSLATIONS_DATA[currentUnit] || [];

            if (data.length === 0) {
                container.innerHTML = '<div style="color:#8fc3d9;text-align:center;padding:2rem;">该单元暂无数据</div>';
                return;
            }

            container.innerHTML = `
                <div class="exam-section">
                    <div class="exam-title">📝 ${currentUnit} 翻译考试</div>
                    <p style="color:#8fc3d9;margin-bottom:1rem;font-size:0.9rem;">
                        请根据中文意思，写出带括号注释的英文原文
                    </p>
                    ${data.map((item, idx) => `
                        <div class="exam-item" data-idx="${idx}">
                            <div class="exam-question">
                                <strong>第 ${item.num} 题：</strong>${item.chinese}
                            </div>
                            <textarea
                                class="exam-input"
                                rows="4"
                                placeholder="请写出英文原文（在生词/关键词后加括号中文注释）..."
                                data-answer="${item.english.replace(/"/g, '&quot;')}"
                                data-mnemonic="${item.mnemonic || ''}"
                            ></textarea>
                            <button class="check-btn" onclick="checkAnswer(${idx})">检查答案</button>
                            <div class="result" id="result-${idx}" style="display:none;"></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // 检查答案
        function checkAnswer(idx) {
            const item = document.querySelector(`[data-idx="${idx}"]`);
            const input = item.querySelector('.exam-input');
            const result = document.getElementById(`result-${idx}`);
            const correctAnswer = input.dataset.answer;
            const userAnswer = input.value.trim();
            const mnemonic = input.dataset.mnemonic;

            if (!userAnswer) {
                result.innerHTML = '⚠️ 请先输入答案';
                result.className = 'result wrong';
                result.style.display = 'block';
                return;
            }

            // 简化比较：去除标点和空格
            const normalize = (s) => s.toLowerCase().replace(/[，。！？、；：""''（）【】\s]/g, '');
            const isCorrect = normalize(userAnswer).includes(normalize(correctAnswer).substring(0, 30)) ||
                             normalize(correctAnswer).includes(normalize(userAnswer).substring(0, 30));

            if (isCorrect) {
                result.innerHTML = '✅ 正确！';
                result.className = 'result correct';
            } else {
                let hint = '';
                if (mnemonic) {
                    hint = `<br><br>💡 <strong>记忆提示：</strong>${mnemonic}`;
                }
                result.innerHTML = `❌ 需要再努力<br><br><strong>参考答案：</strong><br>${formatEnglish(correctAnswer)}${hint}`;
                result.className = 'result wrong';
            }
            result.style.display = 'block';
        }

        // 渲染内容
        function render() {
            if (currentMode === 'study') {
                renderStudyMode();
            } else if (currentMode === 'exam') {
                renderExamMode();
            } else if (currentMode === 'quick') {
                renderQuickReviewMode();
            }
        }

        // 事件监听
        document.getElementById('levelGrid').addEventListener('click', (e) => {
            if (e.target.classList.contains('level-btn')) {
                document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentUnit = e.target.dataset.unit;
                document.getElementById('unit-label').textContent = currentUnit;
                render();
            }
        });

        document.querySelector('.mode-toggle').addEventListener('click', (e) => {
            if (e.target.classList.contains('mode-btn')) {
                document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentMode = e.target.dataset.mode;
                render();
            }
        });

        // 初始化
        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>短语填空 · 模拟考试</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 8px;
        }
        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(4px);
            padding: 1.2rem 1rem;
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
        }
        h1 {
            font-weight: 500;
            color: #e9f2f7;
            text-shadow: 0 2px 6px #0a1e2b;
            letter-spacing: 1px;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 1rem;
            font-size: 1.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 small {
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.8;
            background: #1f4a5e;
            padding: 0.3rem 0.8rem;
            border-radius: 60px;
            border: 1px solid #8fc3d9;
        }
        .progress-bar {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            height: 8px;
            margin: 0 0 1rem;
            overflow: hidden;
        }
        .progress-fill {
            background: #fad974;
            height: 8px;
            border-radius: 30px;
            transition: width 0.25s ease;
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        .intro-text {
            color: #bfdef0;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.2rem;
        }
        .intro-text strong {
            color: #fcdb7a;
        }
        .btn {
            background: #fad974;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
            transition: 0.06s linear;
            cursor: pointer;
            border: 1px solid #ffe399;
            letter-spacing: 0.3px;
            display: inline-block;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b3952b;
        }
        .btn-secondary {
            background: #b6d2df;
            color: #1a3e4e;
            box-shadow: 0 4px 0 #0d2a36;
            border-color: #bad7e6;
        }
        .question-area {
            margin-bottom: 1rem;
        }
        .question-num {
            color: #fcdb7a;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .sentence {
            color: #e9f2f7;
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 1rem;
        }
        .sentence .blank {
            color: #fcdb7a;
            font-weight: 600;
            border-bottom: 2px dashed #fcdb7a;
            padding: 0 4px;
            min-width: 60px;
            display: inline-block;
            text-align: center;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }
        @media (min-width: 480px) {
            .options {
                grid-template-columns: 1fr 1fr;
            }
        }
        .option {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(2px);
            padding: 12px 14px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.15);
            font-size: 0.9rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.1s ease;
            user-select: none;
            text-align: center;
            word-break: break-word;
        }
        .option:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.3);
        }
        .option:active {
            transform: scale(0.97);
        }
        .option.selected {
            border-color: #f7d44a;
            background: rgba(247,212,74,0.15);
            box-shadow: 0 0 0 3px rgba(247,212,74,0.3);
        }
        .option.correct {
            border-color: #4caf50;
            background: rgba(76,175,80,0.2);
            color: #a5d6a7;
        }
        .option.wrong {
            border-color: #ef5350;
            background: rgba(239,83,80,0.2);
            color: #ef9a9a;
        }
        .option.disabled {
            pointer-events: none;
            opacity: 0.5;
        }
        .feedback {
            margin-top: 1rem;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
        }
        .feedback.show {
            display: block;
        }
        .feedback.correct-msg {
            background: rgba(76,175,80,0.2);
            color: #a5d6a7;
            border: 1px solid rgba(76,175,80,0.4);
        }
        .feedback.wrong-msg {
            background: rgba(239,83,80,0.2);
            color: #ef9a9a;
            border: 1px solid rgba(239,83,80,0.4);
        }
        .btn-next {
            margin-top: 1rem;
            width: 100%;
        }
        .result-area {
            text-align: center;
        }
        .score-display {
            font-size: 3rem;
            font-weight: 600;
            color: #fcdb7a;
            margin: 0.5rem 0;
        }
        .score-label {
            color: #bfdef0;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .review-list {
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            margin: 1rem 0;
        }
        .review-item {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 10px 14px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #d4eaf5;
            line-height: 1.5;
        }
        .review-item .status {
            font-weight: 600;
            display: inline-block;
            margin-right: 6px;
        }
        .review-item.correct-item .status {
            color: #a5d6a7;
        }
        .review-item.wrong-item .status {
            color: #ef9a9a;
        }
        .review-item .ans {
            color: #fcdb7a;
            font-weight: 500;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-bar .score-track {
            color: #bfdef0;
            font-size: 0.9rem;
        }
        .nav-bar .score-track strong {
            color: #fcdb7a;
        }
        @media (max-width: 480px) {
            .game-container {
                padding: 0.8rem 0.6rem;
                border-radius: 28px;
            }
            h1 {
                font-size: 1.1rem;
            }
            .sentence {
                font-size: 0.9rem;
            }
            .option {
                font-size: 0.8rem;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>📝 短语填空 <small>模拟考试</small></h1>

    <!-- Intro Screen -->
    <div class="screen active" id="screen-intro">
        <div class="intro-text">
            <p><strong>考试规则</strong></p>
            <p>共 <strong>10</strong> 题，每题 <strong>1</strong> 分，共 <strong>10</strong> 分。</p>
            <p>从 U1、U3、U4、U6 所有单元中随机抽取。</p>
            <p>选出句子空白处最合适的短语，点击选项作答。</p>
        </div>
        <button class="btn" id="btn-start">▶ 开始考试</button>
    </div>

    <!-- Quiz Screen -->
    <div class="screen" id="screen-quiz">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="question-area">
            <div class="question-num" id="question-num">第 1 / 10 题</div>
            <div class="sentence" id="sentence"></div>
            <div class="options" id="options"></div>
            <div class="feedback" id="feedback"></div>
            <button class="btn btn-next" id="btn-next" style="display:none;">下一题 →</button>
        </div>
        <div class="nav-bar">
            <span class="score-track">得分: <strong id="current-score">0</strong> / 10</span>
            <button class="btn btn-secondary" id="btn-quit" style="font-size:0.8rem;padding:6px 14px;">退出</button>
        </div>
    </div>

    <!-- Result Screen -->
    <div class="screen" id="screen-result">
        <div class="result-area">
            <div class="score-label">你的得分</div>
            <div class="score-display" id="final-score">0</div>
            <div class="score-label" id="score-comment"></div>
            <div class="review-list" id="review-list"></div>
            <button class="btn" id="btn-restart">🔄 再来一次</button>
        </div>
    </div>
</div>

<script>
(function(){
    const ALL_QUESTIONS = [
        // U1
        { unit: "U1", sentence: "While the energy market share for coal _____ decline in many parts of the world, coal will remain the most common source of energy in years to come.", answer: "is projected to" },
        { unit: "U1", sentence: "After many years of hard work and struggle, the kind of lifestyle he has always wanted to live is _____.", answer: "within his grasp" },
        { unit: "U1", sentence: "Since AI-driven machines _____ the human brain, they are built to imitate our behavioral patterns.", answer: "are modeled on" },
        { unit: "U1", sentence: "After a change to a low-fat diet, Dennis was able to _____ himself _____ the overweight problem.", answer: "rid; of" },
        { unit: "U1", sentence: "I am flexible with my hours, so I can respond to your questions _____ via email, live chat, or other electronic means.", answer: "within a moment's notice" },
        { unit: "U1", sentence: "We believe that every visitor's safety is important. _____, we require all visitors to sign in at the front desk before entry to the tower building.", answer: "To that end" },
        { unit: "U1", sentence: "We shouldn't _____ success _____ financial status. Rather, our gauge for success should be other things like family, health, and community.", answer: "equate; to" },
        { unit: "U1", sentence: "_____ the health risks, smoking also makes finding a job harder sometimes, especially in the healthcare and childcare sectors.", answer: "On top of" },
        // U3
        { unit: "U3", sentence: "Over the last decade, the trend toward working from home has slowly _____ across the country.", answer: "gained ground" },
        { unit: "U3", sentence: "Many students have _____ the experience of participating in the summer camp _____ life-changing and the best time they've ever had.", answer: "hailed; as" },
        { unit: "U3", sentence: "These workshops provide students with opportunities to experiment with different techniques and _____ what they have learned _____ in a supportive environment.", answer: "put; into practice" },
        { unit: "U3", sentence: "The artist restored the painting and _____ it _____, revealing the fine colors of the rainbow, which were lost beneath layers of dirt.", answer: "brought; to life" },
        { unit: "U3", sentence: "When students are exposed to environments that are _____ learning, the chances of achieving their educational goals increase.", answer: "conducive to" },
        { unit: "U3", sentence: "We should be open to new ways of thinking, _____ what we do, and strive to improve ourselves on the basis of our experience.", answer: "reflect on" },
        { unit: "U3", sentence: "Several hours later, the budget meeting _____ and the board members filed out of the room.", answer: "drew to a close" },
        { unit: "U3", sentence: "Some research suggests that the history of the Mid-Autumn Festival can be _____ more than 3,000 years ago.", answer: "traced back to" },
        // U4
        { unit: "U4", sentence: "If the goods do not _____ the contract specifications, the buyer can request several different kinds of compensation.", answer: "comply with" },
        { unit: "U4", sentence: "The company tried to release an improved milk chocolate bar using condensed milk rather than powdered milk, but it _____ than the previous products.", answer: "fared no better" },
        { unit: "U4", sentence: "For the sake of health, we should _____ the intake of high-calorie and high-fat foods with poor nutritional value.", answer: "cut down on" },
        { unit: "U4", sentence: "Wastewater and the increasing atmospheric CO₂ levels are two great environmental challenges that _____ human life.", answer: "pose a threat to" },
        { unit: "U4", sentence: "The recent oil price rise was found to _____ the changes in supply and demand, but came as a result of uncertainty about the market.", answer: "bear no links to" },
        { unit: "U4", sentence: "Most experts agreed that the cost of conducting the experiment must _____ the potential benefit to society the research might provide.", answer: "be weighed against" },
        { unit: "U4", sentence: "In order to _____ natural resources and minimize waste disposal, it is necessary for everyone to get into the habit of recycling.", answer: "economize on" },
        { unit: "U4", sentence: "Many phishing emails try to deceive you with the threat that your account will _____ if it is not updated right away.", answer: "be in jeopardy" },
        // U6
        { unit: "U6", sentence: "If you say yes to every request and invitation, your schedule would quickly _____ with other people's agendas.", answer: "fill up" },
        { unit: "U6", sentence: "I suppose many jobs we are doing now will disappear if AI is developed and applied _____ large _____.", answer: "on a; scale" },
        { unit: "U6", sentence: "I would like to purchase my own home. I _____ rates, mortgage, and house insurance and found that the monthly payment is about the same as the rent I currently pay.", answer: "factored in" },
        { unit: "U6", sentence: "As one of the preferred floor coverings, carpets often require regular care in the form of vacuuming and cleaning _____ weekly _____.", answer: "on a; basis" },
        { unit: "U6", sentence: "The storm caused widespread damage throughout our city, and it's going to take weeks for us to fully _____ the debris.", answer: "clear up" },
        { unit: "U6", sentence: "The data used for this analysis _____ various sources and assumed to be correct and reliable, but it has not been independently verified.", answer: "was derived from" },
        { unit: "U6", sentence: "The future of our research program does not _____ the success or failure of any single test, but the results of many tests over several years.", answer: "hinge on" }
    ];

    const TOTAL_QUESTIONS = 10;
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;
    let userAnswers = [];

    const screenIntro = document.getElementById('screen-intro');
    const screenQuiz = document.getElementById('screen-quiz');
    const screenResult = document.getElementById('screen-result');
    const sentenceEl = document.getElementById('sentence');
    const optionsEl = document.getElementById('options');
    const questionNumEl = document.getElementById('question-num');
    const progressFill = document.getElementById('progress-fill');
    const currentScoreEl = document.getElementById('current-score');
    const feedbackEl = document.getElementById('feedback');
    const btnNext = document.getElementById('btn-next');
    const finalScoreEl = document.getElementById('final-score');
    const scoreCommentEl = document.getElementById('score-comment');
    const reviewListEl = document.getElementById('review-list');

    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function renderBlank(sentence) {
        return sentence.replace(/_____/g, '<span class="blank">_____</span>');
    }

    function generateOptions(correctAnswer, allAnswers) {
        const pool = allAnswers.filter(a => a !== correctAnswer);
        const shuffledPool = shuffleArray(pool);
        const distractors = shuffledPool.slice(0, 4);
        const opts = [...distractors, correctAnswer];
        return shuffleArray(opts);
    }

    function showScreen(screen) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        screen.classList.add('active');
    }

    function startGame() {
        const shuffled = shuffleArray(ALL_QUESTIONS);
        currentQuestions = shuffled.slice(0, TOTAL_QUESTIONS);
        currentIndex = 0;
        score = 0;
        answered = false;
        userAnswers = [];
        currentScoreEl.textContent = '0';
        showScreen(screenQuiz);
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        const q = currentQuestions[currentIndex];
        const allAnswers = ALL_QUESTIONS.map(item => item.answer);
        const options = generateOptions(q.answer, allAnswers);

        questionNumEl.textContent = `第 ${currentIndex + 1} / ${TOTAL_QUESTIONS} 题 (${q.unit})`;
        sentenceEl.innerHTML = renderBlank(q.sentence);
        progressFill.style.width = `${(currentIndex / TOTAL_QUESTIONS) * 100}%`;
        feedbackEl.className = 'feedback';
        feedbackEl.innerHTML = '';
        btnNext.style.display = 'none';

        optionsEl.innerHTML = '';
        options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.textContent = opt;
            div.dataset.value = opt;
            div.addEventListener('click', () => selectOption(div, opt, q.answer));
            optionsEl.appendChild(div);
        });
    }

    function selectOption(el, selected, correct) {
        if (answered) return;
        answered = true;

        const allOpts = optionsEl.querySelectorAll('.option');
        allOpts.forEach(o => {
            o.classList.add('disabled');
            if (o.dataset.value === correct) {
                o.classList.add('correct');
            }
        });

        userAnswers.push({ question: currentQuestions[currentIndex].sentence, selected, correct, unit: currentQuestions[currentIndex].unit });

        if (selected === correct) {
            score++;
            el.classList.add('correct');
            feedbackEl.className = 'feedback show correct-msg';
            feedbackEl.innerHTML = `✅ 正确！<br>答案：<span style="color:#fcdb7a;font-weight:600;">${correct}</span>`;
        } else {
            el.classList.add('wrong');
            feedbackEl.className = 'feedback show wrong-msg';
            feedbackEl.innerHTML = `❌ 错误！<br>你的答案：<span style="color:#ef9a9a;font-weight:600;">${selected}</span><br>正确答案：<span style="color:#a5d6a7;font-weight:600;">${correct}</span>`;
        }

        currentScoreEl.textContent = score;
        btnNext.style.display = 'inline-block';
        progressFill.style.width = `${((currentIndex + 1) / TOTAL_QUESTIONS) * 100}%`;
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex >= TOTAL_QUESTIONS) {
            showResult();
        } else {
            loadQuestion();
        }
    }

    function showResult() {
        showScreen(screenResult);
        finalScoreEl.textContent = `${score} / ${TOTAL_QUESTIONS}`;

        let comment = '';
        if (score === TOTAL_QUESTIONS) comment = '🎉 完美全对！太厉害了！';
        else if (score >= 8) comment = '👍 很不错！继续加油！';
        else if (score >= 6) comment = '✊ 及格啦，再复习一下错题吧！';
        else comment = '💪 继续努力，多练习就能提高！';
        scoreCommentEl.textContent = comment;

        reviewListEl.innerHTML = '';
        userAnswers.forEach((ua, idx) => {
            const div = document.createElement('div');
            div.className = 'review-item ' + (ua.selected === ua.correct ? 'correct-item' : 'wrong-item');
            const status = ua.selected === ua.correct ? '✓' : '✗';
            const sentenceShort = ua.question.replace(/_____/g, '<span style="color:#fcdb7a;font-weight:600;">_____</span>');
            div.innerHTML = `<span class="status">${status}</span>[${ua.unit}] ${sentenceShort}<br>你的：<span class="ans">${ua.selected}</span> | 正确：<span class="ans">${ua.correct}</span>`;
            reviewListEl.appendChild(div);
        });
    }

    document.getElementById('btn-start').addEventListener('click', startGame);
    btnNext.addEventListener('click', nextQuestion);
    document.getElementById('btn-restart').addEventListener('click', startGame);
    document.getElementById('btn-quit').addEventListener('click', () => {
        showScreen(screenIntro);
    });
})();
</script>
</body>
</html>

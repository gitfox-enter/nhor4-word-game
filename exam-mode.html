<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>考试模拟 · 单词匹配</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 8px;
        }
        .game-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(4px);
            padding: 1rem 0.8rem;
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        h1 {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-weight: 500;
            color: #e9f2f7;
            text-shadow: 0 2px 6px #0a1e2b;
            letter-spacing: 1px;
            padding: 0 0.2rem 0.6rem 0.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 6px 8px;
        }
        .title-part {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .title-part small {
            font-size: 0.8rem;
            font-weight: 300;
            opacity: 0.8;
        }
        .progress-badge {
            background: #1f4a5e;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid #8fc3d9;
            color: #ddf0fa;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
            white-space: nowrap;
        }
        .timer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 1rem;
            border-radius: 60px;
            margin-bottom: 0.8rem;
        }
        .timer {
            color: #fcdb7a;
            font-size: 1.1rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        .timer.warning {
            color: #ef9a9a;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .score-info {
            color: #bfdef0;
            font-size: 0.9rem;
        }
        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem 1rem;
            margin: 0.5rem 0 1rem;
        }
        .word-column, .def-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .col-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #bfdef0;
            font-weight: 400;
            padding-left: 6px;
            margin-bottom: 2px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
            padding: 8px 10px;
            border-radius: 30px;
            border: 2px solid transparent;
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.1s ease;
            cursor: pointer;
            user-select: none;
            word-break: break-word;
            display: flex;
            align-items: center;
            line-height: 1.3;
            min-height: 44px;
        }
        .word-card {
            background: #264e63;
            border-color: #578aa3;
        }
        .def-card {
            background: #1d4d4b;
            border-color: #479f9b;
        }
        .card.selected {
            border: 3px solid #f7d44a;
            background: #3b6c7c;
            transform: scale(1.02);
            box-shadow: 0 0 0 3px rgba(247,212,74,0.4);
        }
        .card.matched {
            opacity: 0.2;
            transform: scale(0.9);
            cursor: default;
            background: #2c3e4a;
            border-color: #5f7e8c;
            text-decoration: line-through 1px rgba(255,255,255,0.2);
            pointer-events: none;
            filter: grayscale(0.8);
        }
        .card:active:not(.matched):not(.selected) {
            transform: scale(0.95);
        }
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 12px;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            margin-top: 0.3rem;
        }
        .status-msg {
            color: #d4eaf5;
            font-size: 0.9rem;
            font-weight: 300;
            flex: 1;
        }
        .status-msg strong {
            font-weight: 600;
            color: #fcdb7a;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn {
            background: #e6edf2;
            border: none;
            padding: 6px 16px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1a3e4e;
            box-shadow: 0 4px 0 #0d2a36;
            transition: 0.06s linear;
            cursor: pointer;
            border: 1px solid #bad7e6;
            letter-spacing: 0.3px;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0d2a36;
        }
        .btn-primary {
            background: #fad974;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
            border-color: #ffe399;
        }
        .btn-secondary {
            background: #b6d2df;
        }
        .footer-note {
            color: #afcbd9;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 0.6rem;
            opacity: 0.7;
        }
        .win-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .win-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .win-box {
            background: rgba(255,255,255,0.13);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 36px;
            padding: 2rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .win-box h2 {
            color: #fcdb7a;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .win-box p {
            color: #bfdef0;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .score-big {
            font-size: 2.5rem;
            font-weight: 600;
            color: #fcdb7a;
            margin: 0.5rem 0 1.5rem;
        }
        .exam-tag {
            background: #ef5350;
            color: white;
            padding: 2px 8px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 6px;
            letter-spacing: 0.5px;
        }
        @media (max-width: 480px) {
            .game-container {
                padding: 0.6rem 0.4rem;
                border-radius: 28px;
            }
            .game-board {
                gap: 0.4rem 0.6rem;
            }
            .card {
                font-size: 0.75rem;
                padding: 6px 8px;
                min-height: 38px;
                border-radius: 24px;
            }
            .title-part {
                font-size: 1.2rem;
            }
            .progress-badge {
                font-size: 0.8rem;
                padding: 0.2rem 0.8rem;
            }
            .status-msg {
                font-size: 0.8rem;
            }
            .btn {
                font-size: 0.75rem;
                padding: 5px 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <h1>
        <span class="title-part">🎯 考试模拟 <small>单词匹配</small><span class="exam-tag">限时</span></span>
        <span class="progress-badge" id="progressDisplay">0 / 10</span>
    </h1>

    <div class="timer-bar">
        <span class="timer" id="timer">05:00</span>
        <span class="score-info">得分: <strong id="current-score" style="color:#fcdb7a;">0</strong> / 10分</span>
    </div>

    <div class="game-board">
        <div class="word-column">
            <div class="col-header">📌 英文</div>
            <div id="wordList"></div>
        </div>
        <div class="def-column">
            <div class="col-header">📖 中文</div>
            <div id="defList"></div>
        </div>
    </div>

    <div class="control-bar">
        <span class="status-msg" id="statusMessage">✦ 选英文 → 选中文</span>
        <div class="btn-group">
            <button class="btn btn-secondary" id="resetGameBtn">🔄 重开</button>
        </div>
    </div>
    <div class="footer-note">从 U1+U3+U4+U6 混合抽取 · 限时5分钟</div>
</div>

<div class="win-overlay" id="winOverlay">
    <div class="win-box">
        <h2>⏰ 时间到 / 全部完成！</h2>
        <p>得分</p>
        <div class="score-big" id="finalScore">0 / 10</div>
        <p id="timeUsed"></p>
        <button class="btn btn-primary" id="winRestart">🔄 再来一次</button>
    </div>
</div>

<script>
(function(){
    const FULL_WORDS = [
        // U1 (69 words - sample 15 for exam pool)
        { word: "urbanization", def: "城市化" },
        { word: "modernize", def: "使现代化" },
        { word: "unparalleled", def: "无比的；空前的" },
        { word: "reshape", def: "改变；重塑" },
        { word: "infrastructure", def: "基础设施" },
        { word: "availability", def: "可用性" },
        { word: "fossil fuel", def: "化石燃料" },
        { word: "devastating", def: "毁灭性的" },
        { word: "detrimental", def: "有害的" },
        { word: "unsustainable", def: "不可持续的" },
        { word: "escalate", def: "升级；恶化" },
        { word: "intuitive", def: "直觉的" },
        { word: "optimize", def: "使最优化" },
        { word: "integrate", def: "结合成为一体" },
        { word: "streamline", def: "精简" },
        // U3 (55 words - sample 15)
        { word: "interior", def: "内部；里面" },
        { word: "attentive", def: "专注的" },
        { word: "makerspace", def: "创客空间" },
        { word: "drone", def: "无人机" },
        { word: "venue", def: "举办地点" },
        { word: "showcase", def: "展示" },
        { word: "emergence", def: "出现" },
        { word: "momentum", def: "动力；势头" },
        { word: "collaboration", def: "合作；协作" },
        { word: "navigate", def: "导航；应付" },
        { word: "analogous", def: "相似的" },
        { word: "ingenuity", def: "善于创造" },
        { word: "ecosystem", def: "生态系统" },
        { word: "trustworthy", def: "值得信赖的" },
        { word: "conducive", def: "有助的；有益的" },
        // U4 (55 words - sample 15)
        { word: "biodiversity", def: "生物多样性" },
        { word: "organism", def: "生物，有机体" },
        { word: "ecological", def: "生态的" },
        { word: "affluence", def: "富裕，富足" },
        { word: "habitable", def: "适宜居住的" },
        { word: "emission", def: "排放物" },
        { word: "depletion", def: "减少，削减" },
        { word: "degradation", def: "退化，恶化" },
        { word: "fertile", def: "肥沃的" },
        { word: "monumental", def: "极大的" },
        { word: "integrity", def: "完整，完全" },
        { word: "disposal", def: "清除，处理" },
        { word: "conserve", def: "保护，保存" },
        { word: "timber", def: "木材" },
        { word: "empower", def: "使自主" },
        // U6 (72 words - sample 15)
        { word: "triple", def: "成为三倍" },
        { word: "reactor", def: "核反应堆" },
        { word: "renewable", def: "可再生的" },
        { word: "controversial", def: "有争议的" },
        { word: "meltdown", def: "堆芯熔毁；暴跌" },
        { word: "extinct", def: "灭绝的" },
        { word: "linear", def: "线性的" },
        { word: "fusion", def: "核聚变" },
        { word: "prototype", def: "原型" },
        { word: "viable", def: "切实可行的" },
        { word: "intricate", def: "复杂精细的" },
        { word: "diffuse", def: "扩散；传播" },
        { word: "synthesis", def: "综合；合成" },
        { word: "supersonic", def: "超音速的" },
        { word: "inaugurate", def: "开创；举行就职典礼" }
    ];

    const EXAM_SIZE = 10;
    const EXAM_TIME = 300; // 5 minutes in seconds

    let examWords = [];
    let matchedCount = 0;
    let selectedElement = null;
    let timerInterval = null;
    let timeLeft = EXAM_TIME;
    let isGameOver = false;

    const wordListEl = document.getElementById('wordList');
    const defListEl = document.getElementById('defList');
    const statusMsg = document.getElementById('statusMessage');
    const progressDisplay = document.getElementById('progressDisplay');
    const timerEl = document.getElementById('timer');
    const scoreEl = document.getElementById('current-score');
    const winOverlay = document.getElementById('winOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    const timeUsedEl = document.getElementById('timeUsed');

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function clearSelected() {
        if (selectedElement) {
            selectedElement.classList.remove('selected');
            selectedElement = null;
        }
    }

    function startTimer() {
        timeLeft = EXAM_TIME;
        timerEl.textContent = formatTime(timeLeft);
        timerEl.classList.remove('warning');
        
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.textContent = formatTime(timeLeft);
            if (timeLeft <= 60) {
                timerEl.classList.add('warning');
            }
            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }

    function endGame() {
        if (isGameOver) return;
        isGameOver = true;
        clearInterval(timerInterval);
        
        const timeUsed = EXAM_TIME - timeLeft;
        const minutes = Math.floor(timeUsed / 60);
        const seconds = timeUsed % 60;
        
        finalScoreEl.textContent = `${matchedCount} / ${EXAM_SIZE}`;
        timeUsedEl.textContent = `用时 ${minutes}分${seconds}秒`;
        winOverlay.classList.add('show');
    }

    function renderExam() {
        wordListEl.innerHTML = '';
        defListEl.innerHTML = '';
        clearSelected();
        matchedCount = 0;
        isGameOver = false;
        progressDisplay.textContent = `0 / ${EXAM_SIZE}`;
        scoreEl.textContent = '0';
        statusMsg.innerHTML = `✦ 选英文 → 选中文`;
        winOverlay.classList.remove('show');

        // Shuffle and pick 10
        const shuffled = shuffleArray([...FULL_WORDS]);
        examWords = shuffled.slice(0, EXAM_SIZE);

        const words = examWords.map(item => item.word);
        const defs = examWords.map(item => item.def);
        const shuffledWords = shuffleArray([...words]);
        const shuffledDefs = shuffleArray([...defs]);

        shuffledWords.forEach(w => {
            const card = document.createElement('div');
            card.className = 'card word-card';
            card.textContent = w;
            card.dataset.type = 'word';
            card.dataset.value = w;
            wordListEl.appendChild(card);
        });

        shuffledDefs.forEach(d => {
            const card = document.createElement('div');
            card.className = 'card def-card';
            card.textContent = d;
            card.dataset.type = 'def';
            card.dataset.value = d;
            defListEl.appendChild(card);
        });

        attachEvents();
        startTimer();
    }

    function attachEvents() {
        const allCards = document.querySelectorAll('.card:not(.matched)');
        allCards.forEach(card => {
            card.removeEventListener('click', cardClickHandler);
            card.addEventListener('click', cardClickHandler);
        });
    }

    function cardClickHandler(e) {
        if (isGameOver) return;
        const card = e.currentTarget;
        if (card.classList.contains('matched')) return;

        const cardType = card.dataset.type;
        const cardValue = card.dataset.value;

        if (!selectedElement) {
            card.classList.add('selected');
            selectedElement = card;
            if (cardType === 'word') {
                statusMsg.innerHTML = `🔍 英文: <strong>${cardValue}</strong>，选对应中文`;
            } else {
                statusMsg.innerHTML = `🔍 中文: <strong>${cardValue}</strong>，选对应英文`;
            }
            return;
        }

        if (selectedElement === card) {
            clearSelected();
            statusMsg.innerHTML = `✋ 已取消`;
            return;
        }

        if (selectedElement.dataset.type !== cardType) {
            let wordText, defText;
            if (selectedElement.dataset.type === 'word' && cardType === 'def') {
                wordText = selectedElement.dataset.value;
                defText = cardValue;
            } else {
                wordText = cardValue;
                defText = selectedElement.dataset.value;
            }

            // Check match
            const match = examWords.find(item => item.word === wordText && item.def === defText);
            if (match) {
                const wordCard = (selectedElement.dataset.type === 'word') ? selectedElement : card;
                const defCard = (selectedElement.dataset.type === 'def') ? selectedElement : card;

                wordCard.classList.remove('selected');
                wordCard.classList.add('matched');
                defCard.classList.remove('selected');
                defCard.classList.add('matched');

                matchedCount++;
                scoreEl.textContent = matchedCount;
                progressDisplay.textContent = `${matchedCount} / ${EXAM_SIZE}`;
                clearSelected();
                statusMsg.innerHTML = `✅ 配对成功！ (${matchedCount}/${EXAM_SIZE})`;

                if (matchedCount === EXAM_SIZE) {
                    setTimeout(() => endGame(), 300);
                }
            } else {
                statusMsg.innerHTML = `❌ 错误，重新选择`;
                clearSelected();
            }
        } else {
            clearSelected();
            card.classList.add('selected');
            selectedElement = card;
            if (cardType === 'word') {
                statusMsg.innerHTML = `🔍 英文: <strong>${cardValue}</strong>，选对应中文`;
            } else {
                statusMsg.innerHTML = `🔍 中文: <strong>${cardValue}</strong>，选对应英文`;
            }
        }
    }

    document.getElementById('resetGameBtn').addEventListener('click', renderExam);
    document.getElementById('winRestart').addEventListener('click', renderExam);

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.card') && !isGameOver) {
            clearSelected();
            if (document.querySelectorAll('.card:not(.matched)').length > 0) {
                statusMsg.innerHTML = `🧼 已取消`;
            }
        }
    });

    // Init
    renderExam();
})();
</script>
</body>
</html>

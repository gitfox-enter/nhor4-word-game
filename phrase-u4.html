<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>短语记忆 · 第四单元</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh; min-height: 100dvh;
            display: flex; justify-content: center; align-items: flex-start;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 8px;
        }
        .game-container {
            max-width: 800px; width: 100%;
            background: rgba(255,255,255,0.13);
            backdrop-filter: blur(4px);
            padding: 1.2rem 1rem;
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
        }
        h1 {
            font-weight: 500; color: #e9f2f7;
            text-shadow: 0 2px 6px #0a1e2b;
            letter-spacing: 1px;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 1rem; font-size: 1.3rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        h1 small {
            font-size: 0.85rem; font-weight: 300; opacity: 0.8;
            background: #1f4a5e; padding: 0.3rem 0.8rem;
            border-radius: 60px; border: 1px solid #8fc3d9;
        }
        .card-item {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
        }
        .card-english {
            color: #e9f2f7; font-size: 0.95rem;
            line-height: 1.6; margin-bottom: 0.8rem; font-weight: 500;
        }
        .card-english .blank {
            color: #fcdb7a; font-weight: 600;
            border-bottom: 2px dashed #fcdb7a;
            padding: 0 4px; min-width: 60px;
            display: inline-block; text-align: center;
        }
        .card-answer {
            color: #a5d6a7; font-size: 0.9rem;
            line-height: 1.6; margin-bottom: 0.5rem;
            padding: 0.8rem; background: rgba(0,0,0,0.2);
            border-radius: 16px; display: none;
        }
        .card-answer.show { display: block; }
        .card-hint {
            color: #8fc3d9; font-size: 0.8rem;
            line-height: 1.4; margin-bottom: 0.6rem;
            padding: 6px 10px; background: rgba(255,255,255,0.05);
            border-radius: 10px; display: none;
        }
        .card-hint.show { display: block; }
        .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-small {
            padding: 6px 14px; font-size: 0.8rem;
            border-radius: 40px; font-weight: 600;
            cursor: pointer; border: none; transition: 0.1s;
        }
        .btn-reveal { background: #264e63; color: #bfdef0; border: 1px solid #578aa3; }
        .btn-mark { background: #1d4d4b; color: #a5d6a7; border: 1px solid #479f9b; }
        .btn-mark.marked { background: #fad974; color: #1d3f4a; border-color: #ffe399; }
        .progress-bar {
            background: rgba(0,0,0,0.3); border-radius: 30px;
            height: 6px; margin: 0 0 1rem; overflow: hidden;
        }
        .progress-fill {
            background: #fad974; height: 6px; border-radius: 30px;
            transition: width 0.25s ease;
        }
        .nav-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 1rem; padding-top: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .nav-bar .progress-text { color: #bfdef0; font-size: 0.9rem; }
        .nav-bar .progress-text strong { color: #fcdb7a; }
        .back-link {
            color: #bfdef0; font-size: 0.85rem;
            text-decoration: none; margin-bottom: 0.5rem; display: inline-block;
        }
        .back-link:hover { color: #fcdb7a; }
        @media (max-width: 480px) {
            .game-container { padding: 0.8rem 0.6rem; border-radius: 28px; }
            h1 { font-size: 1.1rem; }
            .card-english { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <a class="back-link" href="index.html">← 返回首页</a>
    <h1>📝 短语记忆 <small>U4 · 18句</small></h1>

    <div class="progress-bar"><div class="progress-fill" id="practice-progress" style="width:0%"></div></div>
    <div id="cards-container"></div>
    <div class="nav-bar">
        <span class="progress-text">进度: <strong id="card-progress">0/0</strong></span>
    </div>
</div>

<script>
(function(){
    const ALL_CARDS = [
        { id: 1, unit: 'U4', type: 'Expressions', sentence: 'If the goods do not _____ the contract specifications, the buyer can request several different kinds of compensation.', phrase: 'comply with', hint: 'do not 后接动词原形 / comply with' },
        { id: 2, unit: 'U4', type: 'Expressions', sentence: 'The company tried to release an improved milk chocolate bar using condensed milk rather than powdered milk, but it _____ than the previous products.', phrase: 'fared no better', hint: '主语单数，一般过去时 / fared no better' },
        { id: 3, unit: 'U4', type: 'Expressions', sentence: 'For the sake of health, we should _____ the intake of high-calorie and high-fat foods with poor nutritional value.', phrase: 'cut down on', hint: 'should 后接动词原形 / cut down on' },
        { id: 4, unit: 'U4', type: 'Expressions', sentence: 'Wastewater and the increasing atmospheric CO₂ levels are two great environmental challenges that _____ human life.', phrase: 'pose a threat to', hint: '主语是复数，用动词原形 / pose a threat to' },
        { id: 5, unit: 'U4', type: 'Expressions', sentence: 'The recent oil price rise was found to _____ the changes in supply and demand, but came as a result of uncertainty about the market.', phrase: 'bear no links to', hint: 'to 后接动词原形 / bear no links to' },
        { id: 6, unit: 'U4', type: 'Expressions', sentence: 'Most experts agreed that the cost of conducting the experiment must _____ the potential benefit to society the research might provide.', phrase: 'be weighed against', hint: 'must 后接被动语态 / be weighed against' },
        { id: 7, unit: 'U4', type: 'Expressions', sentence: 'In order to _____ natural resources and minimize waste disposal, it is necessary for everyone to get into the habit of recycling.', phrase: 'economize on', hint: 'to 后接动词原形 / economize on' },
        { id: 8, unit: 'U4', type: 'Expressions', sentence: 'Many phishing emails try to deceive you with the threat that your account will _____ if it is not updated right away.', phrase: 'be in jeopardy', hint: 'will 后接动词原形 / be in jeopardy' },
        { id: 9, unit: 'U4', type: 'Words', sentence: 'During the restoration, there were many strict conservation guidelines to which we had to adhere in order to maintain the _____ of the building.', phrase: 'integrity', hint: 'the 后接名词 / integrity' },
        { id: 10, unit: 'U4', type: 'Words', sentence: 'Research indicates that a nurse\'s _____ response to a call bell communicates respect and caring and hence contributes to patient satisfaction.', phrase: 'timely', hint: '修饰名词 response，用形容词 / timely' },
        { id: 11, unit: 'U4', type: 'Words', sentence: 'The air and rivers in this area are getting cleaner, and attempts to preserve animal species and their _____ have been mostly successful.', phrase: 'habitats', hint: 'their 后接复数名词 / habitats' },
        { id: 12, unit: 'U4', type: 'Words', sentence: 'This project has _____ so much of her time and energy that she needs a rest after finishing it.', phrase: 'consumed', hint: 'has 后接过去分词构成现在完成时 / consumed' },
        { id: 13, unit: 'U4', type: 'Words', sentence: 'Due to rising _____ and the availability of a wider range of choices, consumption is now based more on what one wants, rather than what one needs.', phrase: 'affluence', hint: 'Rising 后接名词 / affluence' },
        { id: 14, unit: 'U4', type: 'Words', sentence: 'Improper _____ of plastics into the oceans endangers the marine species and subsequently human lives.', phrase: 'disposal', hint: 'Improper 后接名词 / disposal' },
        { id: 15, unit: 'U4', type: 'Words', sentence: 'The movement of trains along the line was badly affected after the signaling system _____ following a heavy rainstorm.', phrase: 'collapsed', hint: '一般过去时 / collapsed' },
        { id: 16, unit: 'U4', type: 'Words', sentence: 'The _____ of natural resources is a global environmental issue that jeopardizes the livelihoods of billions of people on our planet.', phrase: 'depletion', hint: 'the 后接名词 / depletion' },
        { id: 17, unit: 'U4', type: 'Words', sentence: 'Insects are important sources of food for other animals. Hundreds of species of birds would _____ if there were no insects to feed on.', phrase: 'perish', hint: 'would 后接动词原形 / perish' },
        { id: 18, unit: 'U4', type: 'Words', sentence: 'Scientists in China have carried out advanced research on hydrology and water resources of inland rivers, and have made _____ achievements in recent years.', phrase: 'monumental', hint: '修饰名词 achievements，用形容词 / monumental' }
    ];

    let cardStates = ALL_CARDS.map(() => ({ revealed: false, marked: false }));
    const cardsContainer = document.getElementById('cards-container');
    const progressFill = document.getElementById('practice-progress');
    const cardProgress = document.getElementById('card-progress');

    function renderCards() {
        cardsContainer.innerHTML = '';
        ALL_CARDS.forEach((card, idx) => {
            const state = cardStates[idx];
            const div = document.createElement('div');
            div.className = 'card-item';
            div.innerHTML = `
                <div class="card-english">${card.sentence.replace(/_____/g, '<span class="blank">_____</span>')}</div>
                <div class="card-answer ${state.revealed ? 'show' : ''}" id="answer-${idx}">
                    <strong>✓ ${card.phrase}</strong> · ${card.type}
                </div>
                <div class="card-hint ${state.revealed ? 'show' : ''}" id="hint-${idx}">💡 ${card.hint}</div>
                <div class="card-actions">
                    <button class="btn-small btn-reveal" data-idx="${idx}">${state.revealed ? '🔒 隐藏答案' : '👁 查看答案'}</button>
                    <button class="btn-small btn-mark ${state.marked ? 'marked' : ''}" data-idx="${idx}">${state.marked ? '✅ 已记住' : '⭐ 记住了'}</button>
                </div>`;
            cardsContainer.appendChild(div);
        });
        cardsContainer.querySelectorAll('.btn-reveal').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                cardStates[idx].revealed = !cardStates[idx].revealed;
                document.getElementById(`answer-${idx}`).classList.toggle('show');
                document.getElementById(`hint-${idx}`).classList.toggle('show');
                e.target.textContent = cardStates[idx].revealed ? '🔒 隐藏答案' : '👁 查看答案';
                updateProgress();
            });
        });
        cardsContainer.querySelectorAll('.btn-mark').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.dataset.idx);
                cardStates[idx].marked = !cardStates[idx].marked;
                e.target.classList.toggle('marked');
                e.target.textContent = cardStates[idx].marked ? '✅ 已记住' : '⭐ 记住了';
                updateProgress();
            });
        });
    }
    function updateProgress() {
        const total = cardStates.length;
        const revealed = cardStates.filter(s => s.revealed).length;
        const marked = cardStates.filter(s => s.marked).length;
        progressFill.style.width = `${(revealed / total) * 100}%`;
        cardProgress.textContent = `${marked}/${total} 已记住`;
    }
    renderCards();
    updateProgress();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>短语匹配 · 考试模拟</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 8px;
        }
        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(4px);
            padding: 1rem 0.8rem;
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        h1 {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-weight: 500;
            color: #e9f2f7;
            text-shadow: 0 2px 6px #0a1e2b;
            letter-spacing: 1px;
            padding: 0 0.2rem 0.6rem 0.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 6px 8px;
            font-size: 1.3rem;
        }
        .title-part {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .title-part small {
            font-size: 0.75rem;
            font-weight: 300;
            opacity: 0.8;
        }
        .progress-badge {
            background: #1f4a5e;
            padding: 0.3rem 0.8rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid #8fc3d9;
            color: #ddf0fa;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
            white-space: nowrap;
        }

        /* Options Bank */
        .options-bank {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .bank-title {
            color: #fcdb7a;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            text-align: center;
            letter-spacing: 1px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        @media (max-width: 480px) {
            .options-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        .option-chip {
            background: #1d4d4b;
            border: 2px solid #479f9b;
            border-radius: 16px;
            padding: 8px 10px;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            word-break: break-word;
            line-height: 1.3;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .option-chip:hover {
            background: #264e63;
            border-color: #578aa3;
            transform: scale(1.02);
        }
        .option-chip:active {
            transform: scale(0.97);
        }
        .option-chip.selected {
            border-color: #f7d44a;
            background: #3b6c7c;
            box-shadow: 0 0 0 3px rgba(247,212,74,0.4);
        }
        .option-chip.matched {
            opacity: 0.3;
            background: #2c3e4a;
            border-color: #5f7e8c;
            cursor: default;
            pointer-events: none;
            text-decoration: line-through;
        }
        .option-chip .label {
            font-weight: 700;
            color: #fcdb7a;
            margin-right: 4px;
        }

        /* Sentences */
        .sentences-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sentence-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 12px 14px;
            transition: all 0.15s ease;
        }
        .sentence-row:hover {
            border-color: rgba(255,255,255,0.2);
        }
        .sentence-row.correct {
            border-color: #4caf50;
            background: rgba(76,175,80,0.1);
        }
        .sentence-row.wrong {
            border-color: #ef5350;
            background: rgba(239,83,80,0.1);
        }
        .sentence-row.correct .sentence-num {
            color: #a5d6a7;
        }
        .sentence-row.wrong .sentence-num {
            color: #ef9a9a;
        }
        .sentence-num {
            color: #fcdb7a;
            font-size: 0.85rem;
            font-weight: 700;
            min-width: 24px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .sentence-text {
            color: #e9f2f7;
            font-size: 0.9rem;
            line-height: 1.5;
            flex: 1;
        }
        .sentence-text .blank {
            color: #fcdb7a;
            font-weight: 600;
            border-bottom: 2px dashed #fcdb7a;
            padding: 0 6px;
            min-width: 60px;
            display: inline-block;
            text-align: center;
        }
        .sentence-text .blank.filled {
            border-color: #8fc3d9;
            color: #8fc3d9;
        }
        .sentence-text .blank.correct-ans {
            border-color: #4caf50;
            color: #a5d6a7;
        }
        .sentence-text .blank.wrong-ans {
            border-color: #ef5350;
            color: #ef9a9a;
        }

        /* Control */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 12px;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            margin-top: 1rem;
        }
        .status-msg {
            color: #d4eaf5;
            font-size: 0.9rem;
            font-weight: 300;
            flex: 1;
        }
        .status-msg strong {
            font-weight: 600;
            color: #fcdb7a;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn {
            background: #e6edf2;
            border: none;
            padding: 6px 16px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1a3e4e;
            box-shadow: 0 4px 0 #0d2a36;
            transition: 0.06s linear;
            cursor: pointer;
            border: 1px solid #bad7e6;
            letter-spacing: 0.3px;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0d2a36;
        }
        .btn-primary {
            background: #fad974;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
            border-color: #ffe399;
        }
        .btn-secondary {
            background: #b6d2df;
        }
        .footer-note {
            color: #afcbd9;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 0.6rem;
            opacity: 0.7;
        }

        /* Win */
        .win-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .win-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .win-box {
            background: rgba(255,255,255,0.13);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 36px;
            padding: 2rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .win-box h2 {
            color: #fcdb7a;
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
        }
        .win-box p {
            color: #bfdef0;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .score-big {
            font-size: 2.5rem;
            font-weight: 600;
            color: #fcdb7a;
            margin: 0.5rem 0 1.5rem;
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 0.6rem 0.4rem;
                border-radius: 28px;
            }
            h1 {
                font-size: 1.1rem;
            }
            .option-chip {
                font-size: 0.7rem;
                padding: 6px 8px;
                min-height: 34px;
            }
            .sentence-text {
                font-size: 0.82rem;
            }
            .sentence-row {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <h1>
        <span class="title-part">📝 短语匹配 <small>10道×2分</small></span>
        <span class="progress-badge" id="progressDisplay">0 / 10</span>
    </h1>

    <!-- Options Bank -->
    <div class="options-bank">
        <div class="bank-title">🏦 选项库（点击选择，再点击下方句子填空）</div>
        <div class="options-grid" id="optionsGrid"></div>
    </div>

    <!-- Sentences -->
    <div class="sentences-area" id="sentencesArea"></div>

    <div class="control-bar">
        <span class="status-msg" id="statusMessage">✦ 点击上方选项，再点击下方句子配对</span>
        <div class="btn-group">
            <button class="btn btn-primary" id="btn-check" style="display:none;">✅ 提交答案</button>
            <button class="btn btn-secondary" id="resetGameBtn">🔄 重开</button>
        </div>
    </div>
    <div class="footer-note">从 Words in use + Expressions in use 混合抽取</div>
</div>

<div class="win-overlay" id="winOverlay">
    <div class="win-box">
        <h2>🎉 全部配对成功！</h2>
        <p>得分</p>
        <div class="score-big" id="finalScore">20 / 20</div>
        <button class="btn btn-primary" id="winRestart">🔄 再来一次</button>
    </div>
</div>

<script>
(function(){
    const ALL_PAIRS = [
        { id: 1, sentence: "With your generous support, our charity fund will be _____ for continued growth and success.", phrase: "poised" },
        { id: 2, sentence: "The dock was constructed on a(n) _____ scale with the most modern equipment.", phrase: "lavish" },
        { id: 3, sentence: "Advances in mobile phone technology have enabled the rapid development of _____ communication.", phrase: "instantaneous" },
        { id: 4, sentence: "Computers, vehicles, paintings, furniture, etc. are all _____ assets.", phrase: "tangible" },
        { id: 5, sentence: "Students can overcome _____ together through teamwork.", phrase: "hurdles" },
        { id: 6, sentence: "China rolled out digital driver's licenses amid efforts to _____ services.", phrase: "streamline" },
        { id: 7, sentence: "Long-term confinement is _____ to the physical well-being of animals.", phrase: "detrimental" },
        { id: 8, sentence: "The museum is designed to _____ the interest of children in science.", phrase: "evoke" },
        { id: 9, sentence: "This study tests the _____ that air pollution contributes to lung diseases.", phrase: "hypothesis" },
        { id: 10, sentence: "If your stress is _____ into more serious issues, seek professional help.", phrase: "escalating" },
        { id: 11, sentence: "The professor gave remarks to bring _____ to the issue being discussed.", phrase: "clarity" },
        { id: 12, sentence: "Many governments are _____ to invest in technology to tackle problems.", phrase: "keen" },
        { id: 13, sentence: "The hotel is an ideal _____ for business meetings and weddings.", phrase: "venue" },
        { id: 14, sentence: "Online videos are a great way to _____ products to customers.", phrase: "showcase" },
        { id: 15, sentence: "The _____ of e-commerce has reshaped the way business is conducted.", phrase: "emergence" },
        { id: 16, sentence: "The kindergarten will get a generous _____ of funds.", phrase: "allocation" },
        { id: 17, sentence: "Different objectives often _____ with each other in his job.", phrase: "clash" },
        { id: 18, sentence: "Bird and butterfly wings are _____ in shape and function.", phrase: "analogous" },
        { id: 19, sentence: "The Chinese economy enjoys strong _____ despite challenges.", phrase: "momentum" },
        { id: 20, sentence: "Bob played a leading role in _____ the company through growth.", phrase: "navigating" },
        { id: 21, sentence: "We must maintain the _____ of the building during restoration.", phrase: "integrity" },
        { id: 22, sentence: "A nurse's _____ response communicates respect and caring.", phrase: "timely" },
        { id: 23, sentence: "Attempts to preserve animal species and their _____ have succeeded.", phrase: "habitats" },
        { id: 24, sentence: "This project has _____ so much of her time and energy.", phrase: "consumed" },
        { id: 25, sentence: "Rising _____ leads to consumption based more on wants than needs.", phrase: "affluence" },
        { id: 26, sentence: "Improper _____ of plastics endangers marine species.", phrase: "disposal" },
        { id: 27, sentence: "The signaling system _____ after a heavy rainstorm.", phrase: "collapsed" },
        { id: 28, sentence: "The _____ of natural resources jeopardizes billions of livelihoods.", phrase: "depletion" },
        { id: 29, sentence: "Birds would _____ if there were no insects to feed on.", phrase: "perish" },
        { id: 30, sentence: "Scientists have made _____ achievements in hydrology research.", phrase: "monumental" },
        { id: 31, sentence: "These shelves store cell phones and other small _____.", phrase: "gadgets" },
        { id: 32, sentence: "The only _____ choice is to embrace the technological revolution.", phrase: "viable" },
        { id: 33, sentence: "Saving species from becoming _____ protects the ecosystem.", phrase: "extinct" },
        { id: 34, sentence: "The vase has a _____ design that stands out from round shapes.", phrase: "linear" },
        { id: 35, sentence: "Automation has improved productivity and _____ time to accomplish work.", phrase: "slashed" },
        { id: 36, sentence: "The theater has a(n) _____ system of stage machinery.", phrase: "intricate" },
        { id: 37, sentence: "Reform and opening up _____ an era of economic growth.", phrase: "inaugurated" },
        { id: 38, sentence: "People need to _____ homes to improve airflow.", phrase: "ventilate" },
        { id: 39, sentence: "Her therapy uses a(n) _____ of music, relaxation, and imagery.", phrase: "synthesis" },
        { id: 40, sentence: "This window covering lets you _____ light into the room.", phrase: "diffuse" },
        { id: 41, sentence: "Coal _____ decline in many parts of the world.", phrase: "is projected to" },
        { id: 42, sentence: "The lifestyle he wanted is _____.", phrase: "within his grasp" },
        { id: 43, sentence: "AI machines _____ the human brain.", phrase: "are modeled on" },
        { id: 44, sentence: "Dennis was able to _____ himself _____ the overweight problem.", phrase: "rid; of" },
        { id: 45, sentence: "I can respond to your questions _____.", phrase: "within a moment's notice" },
        { id: 46, sentence: "_____, we require all visitors to sign in.", phrase: "To that end" },
        { id: 47, sentence: "We shouldn't _____ success _____ financial status.", phrase: "equate; to" },
        { id: 48, sentence: "_____ the health risks, smoking makes finding a job harder.", phrase: "On top of" },
        { id: 49, sentence: "Working from home has slowly _____ across the country.", phrase: "gained ground" },
        { id: 50, sentence: "Students _____ the summer camp _____ life-changing.", phrase: "hailed; as" },
        { id: 51, sentence: "Experiment with techniques and _____ what you learned _____.", phrase: "put; into practice" },
        { id: 52, sentence: "The artist restored the painting and _____ it _____.", phrase: "brought; to life" },
        { id: 53, sentence: "Environments that are _____ learning increase success.", phrase: "conducive to" },
        { id: 54, sentence: "Be open to new ways of thinking and _____ what you do.", phrase: "reflect on" },
        { id: 55, sentence: "The budget meeting _____ and members filed out.", phrase: "drew to a close" },
        { id: 56, sentence: "The Mid-Autumn Festival history can be _____ 3,000 years ago.", phrase: "traced back to" },
        { id: 57, sentence: "If goods do not _____ contract specifications, compensation may be requested.", phrase: "comply with" },
        { id: 58, sentence: "The new chocolate bar _____ than previous products.", phrase: "fared no better" },
        { id: 59, sentence: "We should _____ the intake of high-calorie foods.", phrase: "cut down on" },
        { id: 60, sentence: "Wastewater and CO₂ _____ human life.", phrase: "pose a threat to" },
        { id: 61, sentence: "Oil price rise _____ supply and demand changes.", phrase: "bear no links to" },
        { id: 62, sentence: "Experiment cost must _____ potential benefit to society.", phrase: "be weighed against" },
        { id: 63, sentence: "We need to _____ natural resources and minimize waste.", phrase: "economize on" },
        { id: 64, sentence: "Your account will _____ if not updated right away.", phrase: "be in jeopardy" },
        { id: 65, sentence: "Your schedule would quickly _____ with other people's agendas.", phrase: "fill up" },
        { id: 66, sentence: "AI developed and applied _____ large _____.", phrase: "on a; scale" },
        { id: 67, sentence: "I _____ rates, mortgage, and house insurance.", phrase: "factored in" },
        { id: 68, sentence: "Cleaning carpets _____ weekly _____.", phrase: "on a; basis" },
        { id: 69, sentence: "It will take weeks to fully _____ the debris.", phrase: "clear up" },
        { id: 70, sentence: "The data _____ various sources.", phrase: "was derived from" },
        { id: 71, sentence: "The future does not _____ any single test's success.", phrase: "hinge on" }
    ];

    const TOTAL_PAIRS = 10;
    let currentPairs = [];
    let selectedOption = null;
    let matches = {}; // sentenceIndex -> phraseId

    const optionsGrid = document.getElementById('optionsGrid');
    const sentencesArea = document.getElementById('sentencesArea');
    const statusMsg = document.getElementById('statusMessage');
    const progressDisplay = document.getElementById('progressDisplay');
    const winOverlay = document.getElementById('winOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    const btnCheck = document.getElementById('btn-check');

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function renderBlank(sentence) {
        return sentence.replace(/_____/g, '<span class="blank" id="blank-{id}">_____</span>');
    }

    function updateProgress() {
        const filled = Object.keys(matches).length;
        progressDisplay.textContent = `${filled} / ${TOTAL_PAIRS}`;
        if (filled === TOTAL_PAIRS) {
            btnCheck.style.display = 'inline-block';
            statusMsg.innerHTML = `✅ 全部填完，点击提交！`;
        } else {
            btnCheck.style.display = 'none';
            statusMsg.innerHTML = `✦ 已填 ${filled}/${TOTAL_PAIRS}，继续配对`;
        }
    }

    function renderGame() {
        optionsGrid.innerHTML = '';
        sentencesArea.innerHTML = '';
        selectedOption = null;
        matches = {};
        winOverlay.classList.remove('show');
        btnCheck.style.display = 'none';
        updateProgress();
        statusMsg.innerHTML = `✦ 点击上方选项，再点击下方句子配对`;

        // Shuffle and pick 10 pairs
        const shuffled = shuffleArray([...ALL_PAIRS]);
        currentPairs = shuffled.slice(0, TOTAL_PAIRS);

        // Render options bank (A-J labels)
        const labels = 'ABCDEFGHIJ'.split('');
        currentPairs.forEach((pair, idx) => {
            const chip = document.createElement('div');
            chip.className = 'option-chip';
            chip.dataset.phraseId = pair.id;
            chip.dataset.phrase = pair.phrase;
            chip.innerHTML = `<span class="label">${labels[idx]}.</span>${pair.phrase}`;
            chip.addEventListener('click', () => selectOption(chip, pair.id));
            optionsGrid.appendChild(chip);
        });

        // Render sentences (shuffled order)
        const shuffledSentences = shuffleArray([...currentPairs.map((p, i) => ({...p, originalIndex: i}))]);
        shuffledSentences.forEach((pair, displayIdx) => {
            const row = document.createElement('div');
            row.className = 'sentence-row';
            row.dataset.sentenceId = pair.id;
            row.dataset.displayIdx = displayIdx;
            
            const sentenceHtml = renderBlank(pair.sentence).replace(/{id}/g, displayIdx);
            
            row.innerHTML = `
                <span class="sentence-num">${displayIdx + 1}.</span>
                <div class="sentence-text">${sentenceHtml}</div>
            `;
            
            row.addEventListener('click', () => selectSentence(row, pair.id, displayIdx));
            sentencesArea.appendChild(row);
        });
    }

    function selectOption(chip, phraseId) {
        if (chip.classList.contains('matched')) return;
        
        // Toggle selection
        if (selectedOption === chip) {
            chip.classList.remove('selected');
            selectedOption = null;
            statusMsg.innerHTML = `✦ 点击上方选项，再点击下方句子配对`;
            return;
        }
        
        // Clear previous
        if (selectedOption) {
            selectedOption.classList.remove('selected');
        }
        
        chip.classList.add('selected');
        selectedOption = chip;
        statusMsg.innerHTML = `🔍 已选「${chip.dataset.phrase}」，点击句子填空`;
    }

    function selectSentence(row, sentenceId, displayIdx) {
        if (!selectedOption) {
            statusMsg.innerHTML = `⚠️ 先点击上方选项，再点句子`;
            return;
        }
        
        const phraseId = parseInt(selectedOption.dataset.phraseId);
        const phrase = selectedOption.dataset.phrase;
        
        // Remove previous match for this sentence if any
        const prevMatchPhraseId = matches[displayIdx];
        if (prevMatchPhraseId !== undefined) {
            // Unmark previous option
            const prevChip = optionsGrid.querySelector(`[data-phrase-id="${prevMatchPhraseId}"]`);
            if (prevChip) prevChip.classList.remove('matched');
        }
        
        // Set new match
        matches[displayIdx] = phraseId;
        
        // Mark option as matched
        selectedOption.classList.add('matched');
        selectedOption.classList.remove('selected');
        
        // Fill the blank
        const blank = document.getElementById(`blank-${displayIdx}`);
        if (blank) {
            blank.textContent = phrase;
            blank.classList.add('filled');
        }
        
        selectedOption = null;
        updateProgress();
    }

    function checkAnswers() {
        let correct = 0;
        const rows = sentencesArea.querySelectorAll('.sentence-row');
        
        rows.forEach(row => {
            const displayIdx = parseInt(row.dataset.displayIdx);
            const sentenceId = parseInt(row.dataset.sentenceId);
            const matchedPhraseId = matches[displayIdx];
            const blank = document.getElementById(`blank-${displayIdx}`);
            
            if (matchedPhraseId === sentenceId) {
                correct++;
                row.classList.add('correct');
                if (blank) blank.classList.add('correct-ans');
            } else {
                row.classList.add('wrong');
                if (blank) {
                    blank.classList.add('wrong-ans');
                    // Show correct answer
                    const correctPhrase = currentPairs.find(p => p.id === sentenceId)?.phrase || '';
                    blank.textContent = `${blank.textContent} → ${correctPhrase}`;
                }
            }
        });

        // Disable all interactions
        optionsGrid.querySelectorAll('.option-chip').forEach(c => c.style.pointerEvents = 'none');
        sentencesArea.querySelectorAll('.sentence-row').forEach(r => r.style.pointerEvents = 'none');
        btnCheck.style.display = 'none';
        
        statusMsg.innerHTML = `✅ 结果：${correct}/${TOTAL_PAIRS} 正确`;
        
        // Show win overlay after delay
        setTimeout(() => {
            finalScoreEl.textContent = `${correct * 2} / ${TOTAL_PAIRS * 2}`;
            winOverlay.classList.add('show');
        }, 1500);
    }

    function resetGame() {
        winOverlay.classList.remove('show');
        renderGame();
    }

    document.getElementById('resetGameBtn').addEventListener('click', resetGame);
    document.getElementById('winRestart').addEventListener('click', resetGame);
    btnCheck.addEventListener('click', checkAnswers);

    // Init
    renderGame();
})();
</script>
</body>
</html>

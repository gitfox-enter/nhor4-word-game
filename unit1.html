<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>单词消消乐 · 双列手机版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 8px;
        }
        .game-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(4px);
            padding: 1rem 0.8rem;
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        h1 {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-weight: 500;
            color: #e9f2f7;
            text-shadow: 0 2px 6px #0a1e2b;
            letter-spacing: 1px;
            padding: 0 0.2rem 0.6rem 0.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 6px 8px;
        }
        .title-part {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .title-part small {
            font-size: 0.8rem;
            font-weight: 300;
            opacity: 0.8;
        }
        .progress-badge {
            background: #1f4a5e;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid #8fc3d9;
            color: #ddf0fa;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
            white-space: nowrap;
        }
        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem 1rem;
            margin: 0.5rem 0 1rem;
        }
        .word-column, .def-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .col-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #bfdef0;
            font-weight: 400;
            padding-left: 6px;
            margin-bottom: 2px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
            padding: 8px 10px;
            border-radius: 30px;
            border: 2px solid transparent;
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.1s ease;
            cursor: pointer;
            user-select: none;
            word-break: break-word;
            display: flex;
            align-items: center;
            line-height: 1.3;
            min-height: 44px;
        }
        .word-card {
            background: #264e63;
            border-color: #578aa3;
        }
        .def-card {
            background: #1d4d4b;
            border-color: #479f9b;
        }
        .card.selected {
            border: 3px solid #f7d44a;
            background: #3b6c7c;
            transform: scale(1.02);
            box-shadow: 0 0 0 3px rgba(247,212,74,0.4);
        }
        .card.matched {
            opacity: 0.2;
            transform: scale(0.9);
            cursor: default;
            background: #2c3e4a;
            border-color: #5f7e8c;
            text-decoration: line-through 1px rgba(255,255,255,0.2);
            pointer-events: none;
            filter: grayscale(0.8);
        }
        .card:active:not(.matched):not(.selected) {
            transform: scale(0.95);
        }
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 12px;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            margin-top: 0.3rem;
        }
        .status-msg {
            color: #d4eaf5;
            font-size: 0.9rem;
            font-weight: 300;
            flex: 1;
        }
        .status-msg strong {
            font-weight: 600;
            color: #fcdb7a;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn {
            background: #e6edf2;
            border: none;
            padding: 6px 16px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1a3e4e;
            box-shadow: 0 4px 0 #0d2a36;
            transition: 0.06s linear;
            cursor: pointer;
            border: 1px solid #bad7e6;
            letter-spacing: 0.3px;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0d2a36;
        }
        .btn-primary {
            background: #fad974;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
            border-color: #ffe399;
        }
        .btn-secondary {
            background: #b6d2df;
        }
        .footer-note {
            color: #afcbd9;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 0.6rem;
            opacity: 0.7;
        }
        @media (max-width: 480px) {
            .game-container {
                padding: 0.6rem 0.4rem;
                border-radius: 28px;
            }
            .game-board {
                gap: 0.4rem 0.6rem;
            }
            .card {
                font-size: 0.75rem;
                padding: 6px 8px;
                min-height: 38px;
                border-radius: 24px;
            }
            .title-part {
                font-size: 1.2rem;
            }
            .progress-badge {
                font-size: 0.8rem;
                padding: 0.2rem 0.8rem;
            }
            .status-msg {
                font-size: 0.8rem;
            }
            .btn {
                font-size: 0.75rem;
                padding: 5px 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <h1>
        <span class="title-part">🧩 消消乐 <small>U1</small></span>
        <span class="progress-badge" id="progressDisplay">第 1 / 7 关</span>
    </h1>

    <div class="game-board">
        <div class="word-column">
            <div class="col-header">📌 英文</div>
            <div id="wordList"></div>
        </div>
        <div class="def-column">
            <div class="col-header">📖 中文</div>
            <div id="defList"></div>
        </div>
    </div>

    <div class="control-bar">
        <span class="status-msg" id="statusMessage">✦ 选英文 → 选中文</span>
        <div class="btn-group">
            <button class="btn btn-primary" id="nextRoundBtn" style="display:none;">▶ 下一关</button>
            <button class="btn btn-secondary" id="resetGameBtn">🔄 重开</button>
        </div>
    </div>
    <div class="footer-note">每关10对 · 共69对 · 左右配对</div>
</div>

<script>
    (function(){
        const FULL_WORDS = [
            { word: "urbanization", def: "城市化" },
            { word: "modernize", def: "使现代化；采用现代方法" },
            { word: "benchmark", def: "基准；规范" },
            { word: "unparalleled", def: "无比的；无双的；空前的" },
            { word: "be projected to do sth.", def: "预计要" },
            { word: "reshape", def: "改变；重塑" },
            { word: "urban", def: "城市的；都市的" },
            { word: "demographic", def: "人口的；人口统计数据" },
            { word: "infrastructure", def: "基础设施" },
            { word: "infrastructural", def: "基础设施的" },
            { word: "predominant", def: "占优势的；占主导地位的" },
            { word: "predominantly", def: "绝大多数地；主要地" },
            { word: "availability", def: "可用性；空闲" },
            { word: "fossil", def: "化石" },
            { word: "fossil fuel", def: "化石燃料" },
            { word: "devastating", def: "毁灭性的；令人震惊的" },
            { word: "excess", def: "过多的；过量" },
            { word: "prone", def: "易于发生（不好之事）的" },
            { word: "detrimental", def: "有害的；不利的" },
            { word: "outdated", def: "过时的；陈旧的" },
            { word: "unsustainable", def: "无法维持的；不可持续的" },
            { word: "escalate", def: "（使）升级；（使）恶化" },
            { word: "jargon", def: "术语；行话" },
            { word: "interlink", def: "（使）相互连接" },
            { word: "intuitive", def: "直觉的；有直觉力的" },
            { word: "define sth. as", def: "把…定义为" },
            { word: "optimal", def: "最佳的；最适宜的" },
            { word: "interconnected", def: "互相连接的" },
            { word: "operation", def: "业务；经营；操作；手术" },
            { word: "optimize", def: "使最优化" },
            { word: "inhabitant", def: "居民" },
            { word: "equate", def: "使等同" },
            { word: "integrate (with/into)", def: "（使）结合成为一体" },
            { word: "inclusive", def: "包容广阔的；包括一切的" },
            { word: "poised", def: "准备好的；镇定的" },
            { word: "be poised to do sth.", def: "准备好做某事" },
            { word: "transit", def: "交通运输系统；运输" },
            { word: "lavish", def: "大量的；慷慨的；慷慨给予" },
            { word: "cellular", def: "蜂窝状的；细胞的" },
            { word: "computing", def: "计算机使用/技能/编程" },
            { word: "parameter", def: "参数；界限；范围" },
            { word: "constitute", def: "形成；构成；被视为" },
            { word: "concrete", def: "混凝土；混凝土的；具体的" },
            { word: "maximization", def: "最大化" },
            { word: "minimization", def: "最小化" },
            { word: "sustainability", def: "可持续性" },
            { word: "sensor", def: "传感器；感应装置" },
            { word: "minimal", def: "极小的；最少的" },
            { word: "hypothesis", def: "假设；假说" },
            { word: "alert", def: "使警觉；警惕的；机警的" },
            { word: "instantaneous", def: "即刻的；即时的" },
            { word: "instantaneously", def: "即刻地；即时地" },
            { word: "on top of sth.", def: "除…之外" },
            { word: "dispatch", def: "派遣；发送；公文" },
            { word: "within/at a moment's notice", def: "立刻；马上" },
            { word: "enhancement", def: "提高；增加；增强" },
            { word: "tangible", def: "可触摸的；确凿的" },
            { word: "intangible", def: "触摸不到的；无形的" },
            { word: "within (one's) grasp", def: "在（某人）掌握之中" },
            { word: "rid sth./sb. of sth.", def: "使摆脱掉" },
            { word: "fabulous", def: "极好的；巨大的" },
            { word: "undesirable", def: "不受欢迎的；不合意的" },
            { word: "hurdle", def: "障碍；栏架；跨越" },
            { word: "to that end", def: "为此；为达此目标" },
            { word: "evoke", def: "引起，唤起" },
            { word: "namely", def: "即；也就是（说）" },
            { word: "streamline", def: "精简；使成流线型" },
            { word: "mode", def: "方式；模式；状态" },
            { word: "be modeled on", def: "模仿；效仿；仿制" }
        ];

        let allWords = [];
        let currentRoundItems = [];
        let matchedCount = 0;
        const roundSize = 10;
        let totalRounds = 0;
        let currentRound = 0;

        const wordListEl = document.getElementById('wordList');
        const defListEl = document.getElementById('defList');
        const statusMsg = document.getElementById('statusMessage');
        const progressDisplay = document.getElementById('progressDisplay');
        const nextBtn = document.getElementById('nextRoundBtn');
        const resetBtn = document.getElementById('resetGameBtn');

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let selectedElement = null;
        let selectedType = null;
        let selectedWordText = null;
        let selectedDefText = null;

        function clearSelected() {
            if (selectedElement) {
                selectedElement.classList.remove('selected');
                selectedElement = null;
            }
            selectedType = null;
            selectedWordText = null;
            selectedDefText = null;
        }

        function tryMatch(wordText, defText) {
            for (let item of currentRoundItems) {
                if (item.word === wordText && item.def === defText) return true;
            }
            return false;
        }

        function updateNextButton() {
            if (currentRoundItems.length === 0 && matchedCount > 0) {
                if (allWords.length === 0) {
                    statusMsg.innerHTML = `🎉 全部 <strong>${FULL_WORDS.length}</strong> 个单词已消灭！`;
                    nextBtn.style.display = 'none';
                } else {
                    statusMsg.innerHTML = `✨ 过关！剩余 ${allWords.length} 个，点击下一关`;
                    nextBtn.style.display = 'inline-block';
                }
                return true;
            } else {
                nextBtn.style.display = 'none';
                return false;
            }
        }

        function renderRound() {
            wordListEl.innerHTML = '';
            defListEl.innerHTML = '';
            clearSelected();

            if (currentRoundItems.length === 0) {
                statusMsg.innerHTML = `📭 本关无单词`;
                return;
            }

            const words = currentRoundItems.map(item => item.word);
            const defs = currentRoundItems.map(item => item.def);

            const shuffledWords = shuffleArray([...words]);
            const shuffledDefs = shuffleArray([...defs]);

            shuffledWords.forEach(w => {
                const card = document.createElement('div');
                card.className = 'card word-card';
                card.textContent = w;
                card.dataset.type = 'word';
                card.dataset.value = w;
                wordListEl.appendChild(card);
            });

            shuffledDefs.forEach(d => {
                const card = document.createElement('div');
                card.className = 'card def-card';
                card.textContent = d;
                card.dataset.type = 'def';
                card.dataset.value = d;
                defListEl.appendChild(card);
            });

            attachCardEvents();

            const total = FULL_WORDS.length;
            const completed = total - allWords.length - currentRoundItems.length;
            progressDisplay.textContent = `第 ${currentRound}/${totalRounds} 关 (${completed}/${total})`;
            statusMsg.innerHTML = `🎯 配对 0/${currentRoundItems.length}`;
            nextBtn.style.display = 'none';
        }

        function attachCardEvents() {
            const allCards = document.querySelectorAll('.card:not(.matched)');
            allCards.forEach(card => {
                card.removeEventListener('click', cardClickHandler);
                card.addEventListener('click', cardClickHandler);
            });
        }

        function cardClickHandler(e) {
            const card = e.currentTarget;
            if (card.classList.contains('matched')) return;

            const cardType = card.dataset.type;
            const cardValue = card.dataset.value;

            if (!selectedElement) {
                card.classList.add('selected');
                selectedElement = card;
                selectedType = cardType;
                if (cardType === 'word') {
                    selectedWordText = cardValue;
                    selectedDefText = null;
                    statusMsg.innerHTML = `🔍 英文: <strong>${cardValue}</strong>，选对应中文`;
                } else {
                    selectedDefText = cardValue;
                    selectedWordText = null;
                    statusMsg.innerHTML = `🔍 中文: <strong>${cardValue}</strong>，选对应英文`;
                }
                return;
            }

            if (selectedElement === card) {
                clearSelected();
                statusMsg.innerHTML = `✋ 已取消`;
                return;
            }

            if (selectedType !== cardType) {
                let wordText, defText;
                if (selectedType === 'word' && cardType === 'def') {
                    wordText = selectedWordText;
                    defText = cardValue;
                } else if (selectedType === 'def' && cardType === 'word') {
                    wordText = cardValue;
                    defText = selectedDefText;
                } else {
                    clearSelected();
                    return;
                }

                if (tryMatch(wordText, defText)) {
                    const wordCard = (selectedType === 'word') ? selectedElement : card;
                    const defCard = (selectedType === 'def') ? selectedElement : card;

                    wordCard.classList.remove('selected');
                    wordCard.classList.add('matched');
                    defCard.classList.remove('selected');
                    defCard.classList.add('matched');

                    const idx = currentRoundItems.findIndex(item => item.word === wordText && item.def === defText);
                    if (idx !== -1) currentRoundItems.splice(idx, 1);

                    matchedCount++;
                    clearSelected();
                    statusMsg.innerHTML = `✅ 配对成功！ (${matchedCount} 对)`;

                    if (currentRoundItems.length === 0) {
                        updateNextButton();
                    } else {
                        statusMsg.innerHTML = `✅ 已配对 ${matchedCount} 对，剩余 ${currentRoundItems.length} 对`;
                    }
                } else {
                    statusMsg.innerHTML = `❌ 错误，重新选择`;
                    clearSelected();
                }
            } else {
                clearSelected();
                card.classList.add('selected');
                selectedElement = card;
                selectedType = cardType;
                if (cardType === 'word') {
                    selectedWordText = cardValue;
                    selectedDefText = null;
                    statusMsg.innerHTML = `🔍 英文: <strong>${cardValue}</strong>，选对应中文`;
                } else {
                    selectedDefText = cardValue;
                    selectedWordText = null;
                    statusMsg.innerHTML = `🔍 中文: <strong>${cardValue}</strong>，选对应英文`;
                }
            }
        }

        function loadNextRound() {
            if (allWords.length === 0 && currentRoundItems.length === 0) {
                statusMsg.innerHTML = `🏁 通关！全部 ${FULL_WORDS.length} 个单词已消灭！`;
                progressDisplay.textContent = `完成！ ${FULL_WORDS.length}/${FULL_WORDS.length}`;
                nextBtn.style.display = 'none';
                wordListEl.innerHTML = '';
                defListEl.innerHTML = '';
                return;
            }

            if (allWords.length > 0) {
                const count = Math.min(roundSize, allWords.length);
                const roundItems = allWords.splice(0, count);
                currentRoundItems = roundItems;
                matchedCount = 0;
                currentRound++;
                totalRounds = Math.ceil((FULL_WORDS.length - (FULL_WORDS.length - allWords.length - currentRoundItems.length)) / roundSize);
                renderRound();
            }
        }

        function resetGame() {
            allWords = FULL_WORDS.map(item => ({ word: item.word, def: item.def }));
            allWords = shuffleArray(allWords);
            currentRoundItems = [];
            matchedCount = 0;
            currentRound = 0;
            totalRounds = Math.ceil(FULL_WORDS.length / roundSize);
            clearSelected();
            loadNextRound();
            nextBtn.style.display = 'none';
        }

        nextBtn.addEventListener('click', function() {
            if (allWords.length > 0) loadNextRound();
            else {
                statusMsg.innerHTML = `🎉 所有单词已消灭！`;
                nextBtn.style.display = 'none';
            }
        });

        resetBtn.addEventListener('click', resetGame);

        resetGame();

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.card')) {
                clearSelected();
                if (document.querySelectorAll('.card:not(.matched)').length > 0) {
                    statusMsg.innerHTML = `🧼 已取消`;
                }
            }
        });
    })();
</script>
</body>
</html>

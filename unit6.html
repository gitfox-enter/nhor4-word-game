<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>单词消消乐 · 双列手机版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #1b3b4f 0%, #2a5f7a 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 8px;
        }
        .game-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.13);
            backdrop-filter: blur(4px);
            padding: 1rem 0.8rem;
            border-radius: 36px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        h1 {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-weight: 500;
            color: #e9f2f7;
            text-shadow: 0 2px 6px #0a1e2b;
            letter-spacing: 1px;
            padding: 0 0.2rem 0.6rem 0.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
            gap: 6px 8px;
        }
        .title-part {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .title-part small {
            font-size: 0.8rem;
            font-weight: 300;
            opacity: 0.8;
        }
        .progress-badge {
            background: #1f4a5e;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            border: 1px solid #8fc3d9;
            color: #ddf0fa;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
            white-space: nowrap;
        }
        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem 1rem;
            margin: 0.5rem 0 1rem;
        }
        .word-column, .def-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .col-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #bfdef0;
            font-weight: 400;
            padding-left: 6px;
            margin-bottom: 2px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
            padding: 8px 10px;
            border-radius: 30px;
            border: 2px solid transparent;
            font-size: 0.85rem;
            font-weight: 500;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.1s ease;
            cursor: pointer;
            user-select: none;
            word-break: break-word;
            display: flex;
            align-items: center;
            line-height: 1.3;
            min-height: 44px;
        }
        .word-card {
            background: #264e63;
            border-color: #578aa3;
        }
        .def-card {
            background: #1d4d4b;
            border-color: #479f9b;
        }
        .card.selected {
            border: 3px solid #f7d44a;
            background: #3b6c7c;
            transform: scale(1.02);
            box-shadow: 0 0 0 3px rgba(247,212,74,0.4);
        }
        .card.matched {
            opacity: 0.2;
            transform: scale(0.9);
            cursor: default;
            background: #2c3e4a;
            border-color: #5f7e8c;
            text-decoration: line-through 1px rgba(255,255,255,0.2);
            pointer-events: none;
            filter: grayscale(0.8);
        }
        .card:active:not(.matched):not(.selected) {
            transform: scale(0.95);
        }
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 12px;
            background: rgba(0,0,0,0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            margin-top: 0.3rem;
        }
        .status-msg {
            color: #d4eaf5;
            font-size: 0.9rem;
            font-weight: 300;
            flex: 1;
        }
        .status-msg strong {
            font-weight: 600;
            color: #fcdb7a;
        }
        .btn-group {
            display: flex;
            gap: 8px;
        }
        .btn {
            background: #e6edf2;
            border: none;
            padding: 6px 16px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1a3e4e;
            box-shadow: 0 4px 0 #0d2a36;
            transition: 0.06s linear;
            cursor: pointer;
            border: 1px solid #bad7e6;
            letter-spacing: 0.3px;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0d2a36;
        }
        .btn-primary {
            background: #fad974;
            color: #1d3f4a;
            box-shadow: 0 4px 0 #b3952b;
            border-color: #ffe399;
        }
        .btn-secondary {
            background: #b6d2df;
        }
        .footer-note {
            color: #afcbd9;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 0.6rem;
            opacity: 0.7;
        }
        @media (max-width: 480px) {
            .game-container {
                padding: 0.6rem 0.4rem;
                border-radius: 28px;
            }
            .game-board {
                gap: 0.4rem 0.6rem;
            }
            .card {
                font-size: 0.75rem;
                padding: 6px 8px;
                min-height: 38px;
                border-radius: 24px;
            }
            .title-part {
                font-size: 1.2rem;
            }
            .progress-badge {
                font-size: 0.8rem;
                padding: 0.2rem 0.8rem;
            }
            .status-msg {
                font-size: 0.8rem;
            }
            .btn {
                font-size: 0.75rem;
                padding: 5px 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <h1>
        <span class="title-part">🧩 消消乐 <small>U6</small></span>
        <span class="progress-badge" id="progressDisplay">第 1 / 8 关</span>
    </h1>

    <div class="game-board">
        <div class="word-column">
            <div class="col-header">📌 英文</div>
            <div id="wordList"></div>
        </div>
        <div class="def-column">
            <div class="col-header">📖 中文</div>
            <div id="defList"></div>
        </div>
    </div>

    <div class="control-bar">
        <span class="status-msg" id="statusMessage">✦ 选英文 → 选中文</span>
        <div class="btn-group">
            <button class="btn btn-primary" id="nextRoundBtn" style="display:none;">▶ 下一关</button>
            <button class="btn btn-secondary" id="resetGameBtn">🔄 重开</button>
        </div>
    </div>
    <div class="footer-note">每关10对 · 共72对 · 左右配对</div>
</div>

<script>
    (function(){
        const FULL_WORDS = [
            { word: "triple", def: "(使)成为三倍，增加两倍 / 有三个同类事物的；三重的" },
            { word: "versatile", def: "有多种用途的；多功能的；万用的 / 多才多艺的" },
            { word: "reactor", def: "核反应堆" },
            { word: "atomic", def: "原子能的；核能的；核武器的 / 原子的；与原子有关的" },
            { word: "there is a dark side to (doing) sth.", def: "(做)…具有危险的一面" },
            { word: "monopoly", def: "垄断 / 垄断公司" },
            { word: "renewable", def: "可更新的，可再生的 / 可延期的，可续期的" },
            { word: "controversial", def: "引起争论的；有争议的" },
            { word: "treaty", def: "条约" },
            { word: "particulates", def: "颗粒，微粒" },
            { word: "nerve", def: "神经 / 精神紧张；焦虑不安" },
            { word: "factor sth. in", def: "把…计入" },
            { word: "poll", def: "民意调查；民意测验" },
            { word: "meltdown", def: "核反应堆堆芯熔毁 / 暴跌；崩溃" },
            { word: "insurgent", def: "起义者；暴动者；叛乱者" },
            { word: "extinct", def: "灭绝的，绝种的，消失的" },
            { word: "indefinite", def: "不清楚的；模糊的 / 无限期的" },
            { word: "lump", def: "块 / 肿块" },
            { word: "wisp", def: "一缕，一小束" },
            { word: "eventual", def: "最终的；最后的" },
            { word: "hitherto", def: "到目前为止；迄今" },
            { word: "reliable", def: "可信赖的；可靠的" },
            { word: "leave sb. with no choice but to ...", def: "让某人别无选择，只好…" },
            { word: "synthesis", def: "综合物；综合体 / 合成" },
            { word: "plateau", def: "趋于平稳 / 高原 / 停滞时期" },
            { word: "consumption", def: "消耗量 / 购买；消费" },
            { word: "linear", def: "线的；直线的 / 线性的" },
            { word: "skyrocket", def: "急升，猛升，激增" },
            { word: "fusion", def: "核聚变 / 融合，结合" },
            { word: "promising", def: "大有希望的；很有前途的" },
            { word: "confederation", def: "同盟；联盟" },
            { word: "feverish", def: "狂热的；十分焦虑的 / 发烧的" },
            { word: "feverishly", def: "狂热地；十分焦虑地" },
            { word: "glitter", def: "闪烁；闪耀" },
            { word: "glittering", def: "闪闪发光的 / 极为成功的；辉煌的" },
            { word: "on a … scale", def: "以…规模；在…范围内" },
            { word: "prohibitive", def: "贵得使人望而却步的 / 禁止性的" },
            { word: "intricate", def: "复杂精细的 / 复杂难解的" },
            { word: "gadget", def: "设计精巧的小机械（或工具）" },
            { word: "apparatus", def: "器械；仪器；设备" },
            { word: "way", def: "远远地；大大地" },
            { word: "combustion", def: "燃烧（过程）" },
            { word: "principle", def: "原则；原理 / 道德原则；行为准则" },
            { word: "convert sth. into / to sth.", def: "把…转换成" },
            { word: "rotate", def: "(使)旋转；(使)转动 / (使)轮流" },
            { word: "rotary", def: "旋转的；转动的 / 环形交通枢纽；环岛" },
            { word: "blade", def: "桨叶；叶片状物 / 刀刃；刀片" },
            { word: "clockwise", def: "顺时针方向地" },
            { word: "counterclockwise", def: "逆时针方向地" },
            { word: "axis", def: "轴；轴线" },
            { word: "viable", def: "切实可行的；值得做的" },
            { word: "slash", def: "大幅度削减 / 斜线（符号）" },
            { word: "hydroelectric", def: "水力发电的" },
            { word: "outflow", def: "流出，泄漏 / 外流" },
            { word: "forethought", def: "事先的考虑；事先的筹划" },
            { word: "on a regular / daily / weekly, etc. basis", def: "经常 / 每天 / 每周等" },
            { word: "fill up", def: "(使)填满；(使)注满" },
            { word: "clear up", def: "清理；收拾 / 解释；解决；澄清" },
            { word: "excavation", def: "挖掘；开凿 / 发掘" },
            { word: "biomass", def: "生物质" },
            { word: "derive from / be derived from", def: "从…中取得；源自；源于" },
            { word: "standby", def: "备用的 / 备用的人（或物）" },
            { word: "ventilate", def: "使通风；使空气流通 / 发表（意见）" },
            { word: "diffuse", def: "扩散；渗透；弥漫 / 传播；散播" },
            { word: "layer", def: "表层；层 / 级别，阶层" },
            { word: "hinge", def: "给…装铰链 / 铰链，合页" },
            { word: "hinge on / upon sth.", def: "依…而定；取决于…" },
            { word: "deplete", def: "削减；损耗" },
            { word: "supersonic", def: "超音速的" },
            { word: "be upon sb.", def: "即将来临" },
            { word: "inaugurate", def: "开创；创始 / 为…举行就职典礼" },
            { word: "collaboration", def: "合作；协作" }
        ];

        let allWords = [];
        let currentRoundItems = [];
        let matchedCount = 0;
        const roundSize = 10;
        let totalRounds = 0;
        let currentRound = 0;

        const wordListEl = document.getElementById('wordList');
        const defListEl = document.getElementById('defList');
        const statusMsg = document.getElementById('statusMessage');
        const progressDisplay = document.getElementById('progressDisplay');
        const nextBtn = document.getElementById('nextRoundBtn');
        const resetBtn = document.getElementById('resetGameBtn');

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let selectedElement = null;
        let selectedType = null;
        let selectedWordText = null;
        let selectedDefText = null;

        function clearSelected() {
            if (selectedElement) {
                selectedElement.classList.remove('selected');
                selectedElement = null;
            }
            selectedType = null;
            selectedWordText = null;
            selectedDefText = null;
        }

        function tryMatch(wordText, defText) {
            for (let item of currentRoundItems) {
                if (item.word === wordText && item.def === defText) return true;
            }
            return false;
        }

        function updateNextButton() {
            if (currentRoundItems.length === 0 && matchedCount > 0) {
                if (allWords.length === 0) {
                    statusMsg.innerHTML = `🎉 全部 <strong>${FULL_WORDS.length}</strong> 个单词已消灭！`;
                    nextBtn.style.display = 'none';
                } else {
                    statusMsg.innerHTML = `✨ 过关！剩余 ${allWords.length} 个，点击下一关`;
                    nextBtn.style.display = 'inline-block';
                }
                return true;
            } else {
                nextBtn.style.display = 'none';
                return false;
            }
        }

        function renderRound() {
            wordListEl.innerHTML = '';
            defListEl.innerHTML = '';
            clearSelected();

            if (currentRoundItems.length === 0) {
                statusMsg.innerHTML = `📭 本关无单词`;
                return;
            }

            const words = currentRoundItems.map(item => item.word);
            const defs = currentRoundItems.map(item => item.def);
            const shuffledWords = shuffleArray([...words]);
            const shuffledDefs = shuffleArray([...defs]);

            shuffledWords.forEach(w => {
                const card = document.createElement('div');
                card.className = 'card word-card';
                card.textContent = w;
                card.dataset.type = 'word';
                card.dataset.value = w;
                wordListEl.appendChild(card);
            });

            shuffledDefs.forEach(d => {
                const card = document.createElement('div');
                card.className = 'card def-card';
                card.textContent = d;
                card.dataset.type = 'def';
                card.dataset.value = d;
                defListEl.appendChild(card);
            });

            attachCardEvents();

            const total = FULL_WORDS.length;
            const completed = total - allWords.length - currentRoundItems.length;
            progressDisplay.textContent = `第 ${currentRound}/${totalRounds} 关 (${completed}/${total})`;
            statusMsg.innerHTML = `🎯 配对 0/${currentRoundItems.length}`;
            nextBtn.style.display = 'none';
        }

        function attachCardEvents() {
            const allCards = document.querySelectorAll('.card:not(.matched)');
            allCards.forEach(card => {
                card.removeEventListener('click', cardClickHandler);
                card.addEventListener('click', cardClickHandler);
            });
        }

        function cardClickHandler(e) {
            const card = e.currentTarget;
            if (card.classList.contains('matched')) return;

            const cardType = card.dataset.type;
            const cardValue = card.dataset.value;

            if (!selectedElement) {
                card.classList.add('selected');
                selectedElement = card;
                selectedType = cardType;
                if (cardType === 'word') {
                    selectedWordText = cardValue;
                    selectedDefText = null;
                    statusMsg.innerHTML = `🔍 英文: <strong>${cardValue}</strong>，选对应中文`;
                } else {
                    selectedDefText = cardValue;
                    selectedWordText = null;
                    statusMsg.innerHTML = `🔍 中文: <strong>${cardValue}</strong>，选对应英文`;
                }
                return;
            }

            if (selectedElement === card) {
                clearSelected();
                statusMsg.innerHTML = `✋ 已取消`;
                return;
            }

            if (selectedType !== cardType) {
                let wordText, defText;
                if (selectedType === 'word' && cardType === 'def') {
                    wordText = selectedWordText;
                    defText = cardValue;
                } else if (selectedType === 'def' && cardType === 'word') {
                    wordText = cardValue;
                    defText = selectedDefText;
                } else {
                    clearSelected();
                    return;
                }

                if (tryMatch(wordText, defText)) {
                    const wordCard = (selectedType === 'word') ? selectedElement : card;
                    const defCard = (selectedType === 'def') ? selectedElement : card;

                    wordCard.classList.remove('selected');
                    wordCard.classList.add('matched');
                    defCard.classList.remove('selected');
                    defCard.classList.add('matched');

                    const idx = currentRoundItems.findIndex(item => item.word === wordText && item.def === defText);
                    if (idx !== -1) currentRoundItems.splice(idx, 1);

                    matchedCount++;
                    clearSelected();
                    statusMsg.innerHTML = `✅ 配对成功！ (${matchedCount} 对)`;

                    if (currentRoundItems.length === 0) {
                        updateNextButton();
                    } else {
                        statusMsg.innerHTML = `✅ 已配对 ${matchedCount} 对，剩余 ${currentRoundItems.length} 对`;
                    }
                } else {
                    statusMsg.innerHTML = `❌ 错误，重新选择`;
                    clearSelected();
                }
            } else {
                clearSelected();
                card.classList.add('selected');
                selectedElement = card;
                selectedType = cardType;
                if (cardType === 'word') {
                    selectedWordText = cardValue;
                    selectedDefText = null;
                    statusMsg.innerHTML = `🔍 英文: <strong>${cardValue}</strong>，选对应中文`;
                } else {
                    selectedDefText = cardValue;
                    selectedWordText = null;
                    statusMsg.innerHTML = `🔍 中文: <strong>${cardValue}</strong>，选对应英文`;
                }
            }
        }

        function loadNextRound() {
            if (allWords.length === 0 && currentRoundItems.length === 0) {
                statusMsg.innerHTML = `🏁 通关！全部 ${FULL_WORDS.length} 个单词已消灭！`;
                progressDisplay.textContent = `完成！ ${FULL_WORDS.length}/${FULL_WORDS.length}`;
                nextBtn.style.display = 'none';
                wordListEl.innerHTML = '';
                defListEl.innerHTML = '';
                return;
            }

            if (allWords.length > 0) {
                const count = Math.min(roundSize, allWords.length);
                const roundItems = allWords.splice(0, count);
                currentRoundItems = roundItems;
                matchedCount = 0;
                currentRound++;
                totalRounds = Math.ceil((FULL_WORDS.length - (FULL_WORDS.length - allWords.length - currentRoundItems.length)) / roundSize);
                renderRound();
            }
        }

        function resetGame() {
            allWords = FULL_WORDS.map(item => ({ word: item.word, def: item.def }));
            allWords = shuffleArray(allWords);
            currentRoundItems = [];
            matchedCount = 0;
            currentRound = 0;
            totalRounds = Math.ceil(FULL_WORDS.length / roundSize);
            clearSelected();
            loadNextRound();
            nextBtn.style.display = 'none';
        }

        nextBtn.addEventListener('click', function() {
            if (allWords.length > 0) loadNextRound();
            else {
                statusMsg.innerHTML = `🎉 所有单词已消灭！`;
                nextBtn.style.display = 'none';
            }
        });

        resetBtn.addEventListener('click', resetGame);

        resetGame();

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.card')) {
                clearSelected();
                if (document.querySelectorAll('.card:not(.matched)').length > 0) {
                    statusMsg.innerHTML = `🧼 已取消`;
                }
            }
        });
    })();
</script>
</body>
</html>
